<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM | Netijeler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- ДИЗАЙН: КОВЕР И ЦВЕТА --- */
        :root {
            --primary: #27ae60;
            --carpet-red: #8b0505;
            --gold: #d4af37;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
        }

        /* Шапка */
        header {
            background: #fff;
            padding: 15px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo { font-size: 24px; font-weight: bold; color: #333; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* БАННЕР С КОВРОМ (КАК НА ФОТО) */
        .carpet-header {
            width: 100%;
            height: 220px;
            background-color: var(--carpet-red);
            /* Текстура орнамента */
            background-image: url('https://www.transparenttextures.com/patterns/p6.png'); 
            border-bottom: 6px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .container {
            max-width: 900px;
            margin: -60px auto 50px;
            padding: 0 20px;
            position: relative;
            z-index: 5;
        }

        .info-card {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Карточка билета */
        .ticket {
            background: #fff;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            overflow: hidden;
            border: 1px solid #eef0f2;
            transition: 0.3s;
        }

        .ticket:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }

        .flight-path { flex: 1; padding: 25px; display: flex; align-items: center; justify-content: space-between; }
        .buy-zone { width: 200px; background: #fafbfc; border-left: 1px dashed #ddd; padding: 25px; text-align: center; }

        .time { font-size: 24px; font-weight: bold; color: #222; }
        .city { font-size: 13px; color: #888; font-weight: 600; }
        .plane-line { flex: 1; height: 1px; background: #ddd; margin: 0 20px; position: relative; }
        .plane-line i { position: absolute; top: -10px; left: 50%; color: var(--primary); background: #fff; padding: 0 5px; }

        .price { font-size: 22px; font-weight: 800; color: #333; margin-bottom: 10px; }
        .buy-btn { background: #eb5757; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: block; }

        .error-msg { color: #eb5757; text-align: center; font-weight: bold; padding: 40px; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">SAPAR<span>.TM</span></a>
</header>

<div class="carpet-header">
    </div>

<div class="container">
    <div class="info-card">
        <div>
            <h2 id="route-info" style="margin:0;">...</h2>
            <p id="date-info" style="margin:5px 0 0; color:#888;"></p>
        </div>
        <a href="/" style="color:var(--primary); font-weight:bold; text-decoration:none;">Täze gözleg</a>
    </div>

    <div id="results">
        <p style="text-align:center; padding:40px;">Garaşyň, biletler gözlenilýär...</p>
    </div>
</div>

<script>
    /* --- ЛОГИКА (БЕЗ ИЗМЕНЕНИЙ ПУТЕЙ) --- */
    const urlParams = new URLSearchParams(window.location.search);
    const from = urlParams.get('from');
    const to = urlParams.get('to');
    const date = urlParams.get('date');

    document.getElementById('route-info').innerText = `${from} ➔ ${to}`;
    document.getElementById('date-info').innerText = `Sene: ${date}`;

    async function loadTickets() {
        const resBox = document.getElementById('results');
        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });

            if (!response.ok) throw new Error();
            const data = await response.json();
            resBox.innerHTML = "";

            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    const d = new Date(t.departure_at);
                    resBox.innerHTML += `
                        <div class="ticket">
                            <div class="flight-path">
                                <div><div class="time">${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</div><div class="city">${t.origin}</div></div>
                                <div class="plane-line"><i class="fas fa-plane"></i></div>
                                <div><div class="time">--:--</div><div class="city">${t.destination}</div></div>
                            </div>
                            <div class="buy-zone">
                                <div class="price">${t.price.toLocaleString()} RUB</div>
                                <a href="https://www.aviasales.ru${t.link}" class="buy-btn" target="_blank">SATYN AL</a>
                            </div>
                        </div>`;
                });
            } else {
                resBox.innerHTML = "<p style='text-align:center;'>Bilet tapylmady.</p>";
            }
        } catch (e) {
            resBox.innerHTML = "<div class='error-msg'>Ошибка соединения с сервером! Проверьте деплой на Railway.</div>";
        }
    }
    if(from && to && date) loadTickets();
</script>
</body>
</html>
