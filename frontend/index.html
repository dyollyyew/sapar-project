<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #27ae60; --dark: #1e293b; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        
        header { background: white; padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .logo { font-size: 24px; font-weight: bold; color: var(--dark); display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--green); }

        /* Блок с самолетом */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            height: 350px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; text-align: center;
        }
        .hero h2 { font-size: 40px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .search-box { 
            max-width: 1000px; margin: -50px auto 20px; background: white; 
            padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #666; text-transform: uppercase; }
        .input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; min-width: 200px; }

        .gozleg-btn { 
            background: var(--green); color: white; border: none; padding: 12px 40px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; align-self: flex-end; font-size: 16px;
        }
        #res { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .error { color: red; text-align: center; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fa-solid fa-paper-plane"></i> SAPAR.TM</div>
</header>

<div class="hero">
    <h2 id="hero-title">Gyzykly syýahatlar diňe biziň bilen</h2>
    <p>Dünýäniň ähli künjegine uçuşlar</p>
</div>

<div class="search-box">
    <div class="input-group">
        <label>Nireden</label>
        <input type="text" id="from" value="ASB">
    </div>
    <div class="input-group">
        <label>Nirä</label>
        <input type="text" id="to" value="KZN">
    </div>
    <div class="input-group">
        <label>Sene</label>
        <input type="date" id="date">
    </div>
    <button class="gozleg-btn" onclick="searchTickets()">GOZLEG</button>
</div>

<div id="res"></div>

<script>
    async function searchTickets() {
        const from = document.getElementById('from').value.toUpperCase();
        const to = document.getElementById('to').value.toUpperCase();
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('res');

        if (!from || !to || !date) {
            alert("Ähli meýdançalary dolduryň!");
            return;
        }

        resDiv.innerHTML = "<p style='text-align:center;'>Garaşyň...</p>";

        try {
            // ВАЖНО: Мы используем относительный путь, чтобы Railway сам находил API
            const response = await fetch(`/api/search-live?origin=${from}&destination=${to}&date=${date}`);
            
            if (!response.ok) throw new Error("Server error");

            const data = await response.json();
            resDiv.innerHTML = "";

            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    resDiv.innerHTML += `
                        <div style="background:white; padding:20px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid #eee;">
                            <div><b>${t.airline}</b><br>${t.origin} ➔ ${t.destination}</div>
                            <div style="color:#27ae60; font-size:20px; font-weight:bold;">${t.price} TMT</div>
                            <a href="${t.link}" target="_blank" style="background:#27ae60; color:white; padding:10px 20px; border-radius:5px; text-decoration:none;">Satyn al</a>
                        </div>`;
                });
            } else {
                resDiv.innerHTML = "<p style='text-align:center;'>Bilet tapylmady.</p>";
            }
        } catch (e) {
            // Это та самая ошибка со скриншота
            resDiv.innerHTML = "<p class='error'>Ошибка сервера. Проверьте соединение.</p>";
        }
    }
</script>

</body>
</html>
