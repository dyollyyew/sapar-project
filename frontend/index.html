<!DOCTYPE html>

        .ticket { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #1a8a42; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .price { color: #1a8a42; font-weight: bold; font-size: 18px; }
        .buy-btn { background: #ff5e62; color: white; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 14px; }
