<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPARTM - Бронирование</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/material_green.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

    <style>
        :root { --tkm-green: #008755; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial; background: var(--bg); margin: 0; }

        header { background: #fff; padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 24px; font-weight: bold; color: var(--tkm-green); text-decoration: none; }
        .btn-giriş { padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: 600; }

        .hero { background: var(--tkm-green); padding: 50px 0 80px; text-align: center; color: #fff; }

        /* Панель поиска */
        .search-panel { 
            max-width: 1100px; margin: -50px auto 40px; background: #fff; padding: 25px; 
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 10px; position: relative;
        }

        .input-group { flex: 1; position: relative; }
        .input-group label { display: block; font-size: 12px; color: #888; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: var(--tkm-green); }

        /* Кнопка реверса (Обратное направление) */
        .swap-btn {
            background: #fff; border: 1px solid #ddd; border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--tkm-green); transition: 0.3s; margin-top: 20px;
        }
        .swap-btn:hover { background: #f0fdf4; border-color: var(--tkm-green); transform: rotate(180deg); }

        /* Список подсказок городов */
        .dropdown {
            position: absolute; top: 100%; left: 0; right: 0; background: #fff;
            border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 100; display: none;
            max-height: 200px; overflow-y: auto;
        }
        .dropdown-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .dropdown-item:hover { background: #f0f9f4; color: var(--tkm-green); font-weight: bold; }

        .btn-search { background: var(--tkm-green); color: #fff; border: none; padding: 15px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; }

        /* Билет */
        .ticket { background: #fff; border-radius: 8px; padding: 20px; margin: 20px auto; max-width: 900px; border: 1px solid #ddd; }
        .ticket-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .ticket-grid { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; }
        .t-val { font-size: 18px; font-weight: bold; }
        .t-lbl { font-size: 12px; color: #999; }
        .ticket-footer { display: flex; justify-content: flex-end; align-items: center; gap: 20px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .price { font-size: 22px; font-weight: bold; color: var(--tkm-green); }
        .btn-buy { background: var(--tkm-green); color: white; border: none; padding: 10px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">SAPARTM</a>
    <div style="display:flex; gap:15px; align-items:center;">
        <span style="font-size:13px; font-weight:bold; color:#888;">TKM | РУС</span>
        <button class="btn-giriş"><i class="fas fa-user-circle"></i> Giriş</button>
    </div>
</header>

<div class="hero"><h1>HOŞ GELDIŇIZ!</h1></div>

<div class="search-panel">
    <div class="input-group">
        <label>Nireden (Откуда)</label>
        <input type="text" id="fromInput" placeholder="Шаар сайлаң..." autocomplete="off">
        <div id="fromDrop" class="dropdown"></div>
    </div>

    <div class="swap-btn" onclick="swapValues()" title="Обратное направление">
        <i class="fas fa-exchange-alt"></i>
    </div>

    <div class="input-group">
        <label>Nirä (Куда)</label>
        <input type="text" id="toInput" placeholder="Шаар сайлаң..." autocomplete="off">
        <div id="toDrop" class="dropdown"></div>
    </div>

    <div class="input-group">
        <label>Sene (Дата)</label>
        <input type="text" id="datePicker" placeholder="Выбрать дату">
    </div>

    <button class="btn-search" onclick="searchAction()">GÖZLEG</button>
</div>

<div id="resultsArea" style="padding: 0 20px 50px;"></div>

<script src="logic.js"></script>
</body>
</html>
