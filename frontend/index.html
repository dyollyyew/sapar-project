<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM — Ticket System</title>
    <style>
        :root { --main: #00873d; --accent: #ff5e62; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--main); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: none; border: 1px solid white; color: white; padding: 5px 12px; cursor: pointer; border-radius: 4px; margin-left: 5px; }
        .main-container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .search-grid { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr 1fr 1fr; gap: 10px; align-items: end; }
        label { font-size: 12px; color: #666; font-weight: bold; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-action { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .ticket { background: white; padding: 20px; border-radius: 10px; border-left: 8px solid var(--main); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:1000; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 24px; font-weight: bold;">SAPAR.TM</div>
    <div>
        <span id="user-info"></span>
        <button class="nav-btn" onclick="setLang('tk')">TK</button>
        <button class="nav-btn" onclick="setLang('ru')">RU</button>
        <button class="nav-btn" onclick="setLang('en')">EN</button>
        <button class="nav-btn" id="btn-cabinet" onclick="toggleCabinet()" style="background:white; color:var(--main); display:none;">Cabinet</button>
    </div>
</div>

<div class="main-container">
    <div id="auth-box" class="card">
        <div id="login-form">
            <h3 id="t-login">Login</h3>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-action" onclick="login()">ENTER</button>
            <p onclick="showReg(true)" style="color:blue; cursor:pointer; font-size:14px; margin-top:10px;">Create account (Registration)</p>
        </div>
        <div id="reg-form" style="display:none;">
            <h3 id="t-reg">Registration</h3>
            <input type="text" id="rName" placeholder="Full Name (Latin)">
            <input type="email" id="rEmail" placeholder="Email">
            <input type="password" id="rPass" placeholder="Password">
            <input type="text" id="rPassp" placeholder="Passport (I-AS123456)">
            <button class="btn-action" onclick="register()">REGISTER</button>
            <p onclick="showReg(false)" style="color:blue; cursor:pointer; font-size:14px; margin-top:10px;">Back to Login</p>
        </div>
    </div>

    <div id="search-box" class="card" style="display:none;">
        <div class="search-grid">
            <div><label id="l-from">From</label><select id="from"></select></div>
            <div><label id="l-to">To</label><select id="to"></select></div>
            <div><label id="l-date">Date</label><input type="date" id="dateS"></div>
            <div><label id="l-back">Return</label><input type="date"></div>
            <div><label id="l-who">Pass.</label><select><option>1 Pass.</option></select></div>
        </div>
        <button class="btn-action" onclick="search()" id="b-find">FIND TICKETS</button>
    </div>

    <div id="cabinet-box" class="card" style="display:none;">
        <h3 id="t-my">My Bookings</h3>
        <div id="my-list"></div>
    </div>

    <div id="results"></div>
</div>

<div id="modal" class="modal">
    <div class="card" style="width:350px;">
        <h3 id="t-pass">Passenger Data (LATIN)</h3>
        <input type="text" id="pName" placeholder="NAME" oninput="this.value=this.value.replace(/[^A-Za-z]/g,'')">
        <input type="text" id="pSurname" placeholder="SURNAME" oninput="this.value=this.value.replace(/[^A-Za-z]/g,'')">
        <input type="text" id="pDoc" placeholder="PASSPORT">
        <p style="font-size:11px; color:gray;" id="l-fee">* 5% Service fee included</p>
        <button class="btn-action" onclick="confirmBook()">PAY & GET TICKET</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
    const API = 'https://sapar-project-production.up.railway.app';
    let user = JSON.parse(localStorage.getItem('sapar_user'));
    let currentTick = null;

    const i18n = {
        ru: { from: "Откуда", to: "Куда", find: "НАЙТИ БИЛЕТЫ", my: "Мои билеты", fee: "* Комиссия 5% включена", pass: "Данные пассажира (LATIN)" },
        tk: { from: "Nireden", to: "Nirä", find: "TAP", my: "Biletlerim", fee: "* 5% komissiýa goşuldy", pass: "Ýolagçy maglumaty (LATIN)" },
        en: { from: "From", to: "To", find: "FIND TICKETS", my: "My Bookings", fee: "* 5% Service fee included", pass: "Passenger Data (LATIN)" }
    };

    function setLang(l) {
        document.getElementById('l-from').innerText = i18n[l].from;
        document.getElementById('l-to').innerText = i18n[l].to;
        document.getElementById('b-find').innerText = i18n[l].find;
        document.getElementById('l-fee').innerText = i18n[l].fee;
        document.getElementById('t-my').innerText = i18n[l].my;
        document.getElementById('t-pass').innerText = i18n[l].pass;
    }

    window.onload = async () => {
        if(user) showMain();
        const res = await fetch(`${API}/api/cities`);
        const cities = await res.json();
        cities.forEach(c => {
            document.getElementById('from').add(new Option(c, c));
            document.getElementById('to').add(new Option(c, c));
        });
        document.getElementById('dateS').value = "2026-04-05";
        setLang('tk');
    };

    function showReg(s) {
        document.getElementById('login-form').style.display = s ? 'none' : 'block';
        document.getElementById('reg-form').style.display = s ? 'block' : 'none';
    }

    async function login() {
        const email = document.getElementById('email').value, password = document.getElementById('pass').value;
        const res = await fetch(`${API}/api/auth/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password}) });
        const data = await res.json();
        if(data.success) { localStorage.setItem('sapar_user', JSON.stringify(data.user)); location.reload(); } else alert("Error");
    }

    async function register() {
        const name = document.getElementById('rName').value, email = document.getElementById('rEmail').value, password = document.getElementById('rPass').value, passport = document.getElementById('rPassp').value;
        const res = await fetch(`${API}/api/auth/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, email, password, passport}) });
        if(res.ok) { alert("Success! Please login."); showReg(false); } else alert("Error");
    }

    function showMain() {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('search-box').style.display = 'block';
        document.getElementById('btn-cabinet').style.display = 'inline-block';
        document.getElementById('user-info').innerText = user.name + " | ";
    }

    function toggleCabinet() {
        const b = document.getElementById('cabinet-box');
        b.style.display = b.style.display === 'none' ? 'block' : 'none';
        if(b.style.display === 'block') loadMy();
    }

    async function search() {
        const f = document.getElementById('from').value, t = document.getElementById('to').value, d = document.getElementById('dateS').value;
        const res = await fetch(`${API}/api/search?from=${f}&to=${t}&date=${d}`);
        const data = await res.json();
        const div = document.getElementById('results'); div.innerHTML = '';
        data.forEach(tk => {
            const price = (tk.price * 1.05).toFixed(0);
            div.innerHTML += `<div class="ticket">
                <div><b>${tk.time}</b><br><small>${tk.airline}</small></div>
                <div style="text-align:right"><b style="color:var(--main); font-size:20px;">${price} TMT</b><br>
                <button class="btn-action" style="width:auto; padding:5px 15px;" onclick='openBook(${JSON.stringify(tk)})'>BUY</button></div>
            </div>`;
        });
    }

    function openBook(tk) { currentTick = tk; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function confirmBook() {
        const n = document.getElementById('pName').value, s = document.getElementById('pSurname').value, p = document.getElementById('pDoc').value;
        if(!n || !s || !p) return alert("Fill Latin!");
        const res = await fetch(`${API}/api/book`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ trip_id: currentTick.id, user_id: user.id, name: n, surname: s, passport: p, price: currentTick.price, email: user.email, route: `${currentTick.departure} -> ${currentTick.arrival}`, f_date: currentTick.date })
        });
        if(res.ok) { alert("Ticket sent to email!"); closeModal(); }
    }

    async function loadMy() {
        const res = await fetch(`${API}/api/my-bookings?userId=${user.id}`);
        const data = await res.json();
        const div = document.getElementById('my-list'); div.innerHTML = '';
        data.forEach(b => {
            div.innerHTML += `<div style="border-bottom:1px solid #eee; padding:10px 0;">
                <b>${b.route}</b><br><small>${b.flight_date} | ${b.total_price} TMT</small>
            </div>`;
        });
    }
</script>
</body>
</html>
