\<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Advanced Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tkm-green: #00563b; --tkm-gold: #c5a059; --bg: #f5f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--tkm-green); color: white; padding: 25px; display: flex; flex-direction: column; }
        .brand { font-size: 24px; font-weight: bold; margin-bottom: 40px; border-bottom: 2px solid var(--tkm-gold); padding-bottom: 10px; }
        .nav-link { padding: 15px; color: white; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: var(--tkm-gold); }

        /* Content Areas */
        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .page { display: none; padding: 40px; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Forms & Inputs */
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: #777; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }

        .btn-primary { background: var(--tkm-green); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-logout { color: #ff7675; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }

        /* Search Styles from your screenshots */
        .search-box { background: white; padding: 30px; border-radius: 20px; display: flex; gap: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.12); margin-top: -50px; }
        .hero { background: var(--tkm-green); color: white; padding: 80px 20px; text-align: center; }
        
        .ticket { background: white; margin: 15px 0; border-radius: 15px; display: flex; border: 1px solid #eee; overflow: hidden; }
        .ticket-info { flex: 1; padding: 25px; display: flex; justify-content: space-around; align-items: center; }
        .ticket-buy { width: 180px; padding: 25px; background: #fafafa; border-left: 1px dashed #ccc; text-align: center; }
        .price { font-size: 22px; font-weight: bold; color: var(--tkm-green); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">SAPAR.TM</div>
    <div class="nav-link active" onclick="showP('search-p')"><i class="fas fa-search"></i> Gözleg</div>
    
    <div id="auth-links" style="display: none;">
        <div class="nav-link" onclick="showP('orders-p')"><i class="fas fa-ticket-alt"></i> Sargytlarym</div>
        <div class="nav-link" onclick="showP('settings-p')"><i class="fas fa-cog"></i> Sazlamalar</div>
    </div>

    <div class="nav-link" id="login-nav" onclick="userLogin()"><i class="fas fa-user-circle"></i> <span>Giriş</span></div>
    
    <div class="nav-link btn-logout" id="logout-nav" style="display: none;" onclick="userLogout()">
        <i class="fas fa-sign-out-alt"></i> Çykyş
    </div>
</div>

<div class="main">
    <div id="search-p" class="page active-page">
        <div class="hero"><h1>Bagtly ýollar!</h1></div>
        <div style="max-width: 1000px; margin: 0 auto; width: 95%;">
            <div class="search-box">
                <input type="text" id="from" placeholder="Nireden" style="flex:1; padding:12px; border:1px solid #ddd; border-radius:10px;">
                <input type="text" id="to" placeholder="Nirä" style="flex:1; padding:12px; border:1px solid #ddd; border-radius:10px;">
                <button class="btn-primary" onclick="searchFlights()">GÖZLEG</button>
            </div>
            <div id="results" style="margin-top: 30px;"></div>
        </div>
    </div>

    <div id="orders-p" class="page">
        <h2>Meniň sargytlarym</h2>
        <div id="orders-list">Sargyt tapylmady.</div>
    </div>

    <div id="settings-p" class="page">
        <h2>Sazlamalar</h2>
        <div class="card">
            <div class="input-group">
                <label>Doly adyňyz (Загранпаспорт боюнча)</label>
                <input type="text" id="set-name" placeholder="ANNA MURATOW">
            </div>
            <div class="input-group">
                <label>Загранпаспорт серия (I-AS 123456)</label>
                <input type="text" id="set-pass" placeholder="I-AS 123456">
            </div>
            <button class="btn-primary" onclick="saveSettings()">Ýatda sakla</button>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let userData = { name: "", passport: "" };
    let myOrders = [];

    // Логика Входа
    function userLogin() {
        const u = prompt("Ulanyjy adyňyz:");
        if(u) {
            currentUser = u;
            document.querySelector('#login-nav span').innerText = u;
            document.getElementById('auth-links').style.display = 'block';
            document.getElementById('logout-nav').style.display = 'flex';
            document.getElementById('login-nav').onclick = null; // Отключаем повторный промпт
        }
    }

    // Логика Выхода
    function userLogout() {
        if(confirm("Hasapdan çykmak isleýärsiňizmi?")) {
            location.reload(); 
        }
    }

    // Сохранение настроек
    function saveSettings() {
        userData.name = document.getElementById('set-name').value.toUpperCase();
        userData.passport = document.getElementById('set-pass').value.toUpperCase();
        alert("Maglumatlar saklandy! İndi bilet alanyňyzda awtomatik doldurylar.");
    }

    // Поиск (упрощенная имитация для примера)
    async function searchFlights() {
        const from = document.getElementById('from').value;
        const to = document.getElementById('to').value;
        const resDiv = document.getElementById('results');
        
        resDiv.innerHTML = `
            <div class="ticket">
                <div class="ticket-info">
                    <b>${from || 'ASB'}</b> <i class="fas fa-plane"></i> <b>${to || 'IST'}</b>
                </div>
                <div class="ticket-buy">
                    <div class="price">32500 RUB</div>
                    <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="quickBuy('${from}','${to}', 32500)">SATYN AL</button>
                </div>
            </div>`;
    }

    function quickBuy(f, t, p) {
        if(!currentUser) { alert("Sargyt etmek üçin ulgama giriň!"); return; }
        
        // Автоподстановка из настроек
        const name = userData.name || prompt("Yolagçynyň ady (Загран):");
        const pass = userData.passport || prompt("Pasport seriýasy (I-AS...):");

        if(name && pass) {
            const order = { f, t, p, name, pass, id: 'SAP'+Math.floor(Math.random()*999) };
            myOrders.push(order);
            renderOrders();
            alert(`Sargyt kabul edildi!\nYolagçy: ${name}\nBilet "Sargytlarym" bölümine goşuldy.`);
        }
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        list.innerHTML = myOrders.map(o => `
            <div style="background:white; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <div><b>${o.f} -> ${o.t}</b><br><small>${o.name} | ${o.pass}</small></div>
                <b style="color:var(--tkm-green)">${o.p} RUB</b>
            </div>
        `).join('');
    }

    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
