<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Sapar Airlines Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
:root {
    --tkm-green: #008755;
    --gold: #d4af37;
}

body { font-family: sans-serif; background: #f4f4f4; line-height: 1.6; }

header { 
    background: white; padding: 15px 5%; 
    display: flex; justify-content: space-between; 
    border-bottom: 4px solid var(--tkm-green); 
}

.hero-banner { 
    background: var(--tkm-green); color: white; 
    text-align: center; padding: 60px 20px; 
}

.search-card { 
    background: white; max-width: 1000px; margin: -30px auto 40px; 
    padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
}

.popular-grid { 
    display: flex; gap: 20px; justify-content: center; padding: 20px; 
}

.city-card { 
    background: white; border-radius: 10px; overflow: hidden; width: 250px; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}</style>
</head>
<body>

<header>
    <div class="logo-area">
        <i class="fas fa-paper-plane" style="color:var(--tkm-green); font-size: 24px;"></i>
        <div class="logo-text">Sapar<span style="color:var(--gold)">Airlines</span></div>
    </div>
    <div class="lang-btns">
        <button onclick="changeLang('tk')">TKM</button>
        <button onclick="changeLang('ru')">РУС</button>
    </div>
</header>

<div class="hero-banner">
    <h1>HOŞ GELDIŇIZ! / WELCOME</h1>
    <p>Aşgabat — Dünýäniň gapysy</p>
</div>

<div class="search-section">
    <h2 class="popular-title" data-i18n="popularTitle">Meşhur ugurlar / Популярные направления</h2>

<div class="popular-grid">
    <div class="city-card" onclick="setQuickSearch('ASB', 'IST')">
        <img src="https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?w=400" alt="Istanbul">
        <div class="city-overlay">
            <h3>Aşgabat — Stambul</h3>
        </div>
    </div>
    <div class="city-card" onclick="setQuickSearch('ASB', 'DME')">
        <img src="https://images.unsplash.com/photo-1513326738677-b964603b136d?w=400" alt="Moscow">
        <div class="city-overlay">
            <h3>Aşgabat — Moskwa</h3>
        </div>
    </div>
    <div class="city-card" onclick="setQuickSearch('ASB', 'DXB')">
        <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=400" alt="Dubai">
        <div class="city-overlay">
            <h3>Aşgabat — Dubaý</h3>
        </div>
    </div>
</div>
    <div class="search-card">
        <div class="input-field">
            <label>Nireden (From)</label>
            <input type="text" id="from" value="MOW">
        </div>
        <div class="input-field">
            <label>Nirä (To)</label>
            <input type="text" id="to" value="ASB">
        </div>
        <div class="input-field">
            <label>Sene (Date)</label>
            <input type="date" id="date">
        </div>
        <button class="search-btn" onclick="runSearch()">Gözleg (Search)</button>
    </div>
</div>

<div class="results-container" id="results-list">
    </div>

<script src="logic.js"></script>
</body>
</html>
