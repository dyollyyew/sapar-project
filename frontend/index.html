<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Professional Aggregator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --tkm-red-grad: linear-gradient(135deg, #d32f2f 0%, #8b0000 100%);
            --tkm-green: #2ecc71;
            --sidebar-w: 300px;
        }
        
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden;
        }

        /* САЙДБАР */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--tkm-red-grad);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
        }

        .menu-item { 
            display: flex; align-items: center; gap: 15px; padding: 18px 0; 
            cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .menu-item:hover { color: var(--tkm-green); transform: translateX(10px); }

        /* ОСНОВНАЯ ЧАСТЬ */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

        header {
            background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .logo { font-size: 28px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 10px; }
        .logo i { 
            color: white; background: var(--tkm-green); padding: 8px; 
            border-radius: 50%; font-size: 18px; /* Стиль Telegram */
        }

        .container { padding: 40px; max-width: 1000px; margin: 0 auto; width: 100%; }

        /* КАРТОЧКА БИЛЕТА */
        .ticket {
            background: white; margin-top: 20px; border-radius: 12px; display: flex;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee;
        }
        .t-info { flex: 2; padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .t-buy { flex: 1; background: #fafafa; border-left: 1px dashed #ccc; padding: 30px; text-align: center; }

        /* БАГАЖ */
        .baggage-select { margin-top: 10px; font-size: 13px; color: #666; }
        .bag-btn { border: 1px solid #ddd; padding: 4px 8px; cursor: pointer; border-radius: 4px; }
        .bag-btn.active { background: var(--tkm-green); color: white; border-color: var(--tkm-green); }

        /* КРАСНОЕ ОКНО ВХОДА */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content { 
            background: #d32f2f; color: white; padding: 40px; border-radius: 15px; 
            width: 350px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-content input { 
            width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; font-family: inherit;
        }
        .btn-login { 
            background: var(--tkm-green); color: white; border: none; width: 100%; 
            padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px;
        }

        /* ЛК ЗОНА */
        .lk-screen { display: none; padding: 20px; background: white; border-radius: 10px; margin-top: 20px; border: 1px solid #ddd; }
        .admin-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-size: 24px; font-weight: bold; margin-bottom: 30px;">SAPAR.TM</div>
    <div class="menu-item" onclick="toggleView('search')"><i class="fas fa-search"></i> <span class="tk">Gözleg</span></div>
    <div class="menu-item" onclick="openLogin()"><i class="fas fa-user"></i> <span class="tk">Giriş</span></div>
    <div class="menu-item" onclick="toggleView('lk')"><i class="fas fa-briefcase"></i> <span class="tk">Meniň biletlerim</span></div>
</div>

<div class="main">
    <header>
        <div class="logo"><i class="fas fa-paper-plane"></i> SAPAR<span>.TM</span></div>
        <div style="font-weight: bold; color: var(--tkm-green);">TKM | RU</div>
    </header>

    <div class="container" id="search-view">
        <h2 style="text-align: center; color: #444;">Ak ýollar size hemra bolsun!</h2>
        <div style="background: white; padding: 25px; border-radius: 10px; display: flex; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <input type="text" id="from" placeholder="Nireden" style="flex:1; padding:12px; border:1px solid #ddd;">
            <input type="text" id="to" placeholder="Nirä" style="flex:1; padding:12px; border:1px solid #ddd;">
            <input type="date" id="date" style="flex:1; padding:12px; border:1px solid #ddd;">
            <button onclick="doSearch()" style="background: var(--tkm-green); color:white; border:none; padding:0 30px; border-radius:5px; cursor:pointer; font-weight:bold;">GÖZLEG</button>
        </div>
        <div id="results"></div>
    </div>

    <div class="container" id="lk-view" style="display:none;">
        <div id="passenger-lk" class="lk-screen">
            <h3>Meniň biletlerim</h3>
            <p>Sizde häzirki wagtda işjeň bilet ýok.</p>
        </div>
        <div id="admin-lk" class="lk-screen">
            <h3>Admin Paneli (Dolandyryş)</h3>
            <div id="passenger-list">
                <div class="admin-row"><span>Myrat S. (ASB-MOW)</span> <button style="color:red; border:none; cursor:pointer;" onclick="this.parentElement.remove()">Poz</button></div>
                <div class="admin-row"><span>Gurban O. (ASB-IST)</span> <button style="color:red; border:none; cursor:pointer;" onclick="this.parentElement.remove()">Poz</button></div>
            </div>
            <button style="margin-top:20px; background:var(--tkm-green); color:white; border:none; padding:10px;">+ Täze passenger goş</button>
        </div>
    </div>
</div>

<div id="loginModal" class="modal" onclick="if(event.target == this) this.style.display='none'">
    <div class="modal-content">
        <h2>Ulgama girmek</h2>
        <input type="text" id="u-login" placeholder="Loginiňiz">
        <input type="password" id="u-pass" placeholder="Parolyňyz">
        <button class="btn-login" onclick="handleLogin()">GIRIŞ</button>
        <p style="font-size: 12px; margin-top: 15px; opacity: 0.8;">Admin: admin / admin123</p>
    </div>
</div>

<script>
    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }

    function handleLogin() {
        const u = document.getElementById('u-login').value;
        const p = document.getElementById('u-pass').value;
        document.getElementById('loginModal').style.display = 'none';
        
        if(u === 'admin' && p === 'admin123') {
            alert('Admin hökmünde girildi!');
            toggleView('lk');
            document.getElementById('admin-lk').style.display = 'block';
            document.getElementById('passenger-lk').style.display = 'none';
        } else {
            alert('Hoş geldiňiz!');
            toggleView('lk');
            document.getElementById('passenger-lk').style.display = 'block';
            document.getElementById('admin-lk').style.display = 'none';
        }
    }

    function toggleView(v) {
        document.getElementById('search-view').style.display = (v === 'search' ? 'block' : 'none');
        document.getElementById('lk-view').style.display = (v === 'lk' ? 'block' : 'none');
    }

    async function doSearch() {
        const from = document.getElementById('from').value.toUpperCase();
        const to = document.getElementById('to').value.toUpperCase();
        const date = document.getElementById('date').value;
        const res = document.getElementById('results');
        res.innerHTML = "Garaşyň...";

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            res.innerHTML = "";

            data.tickets.forEach(t => {
                const price = Math.round(t.price * 1.05); // 5% комиссия
                const dep = new Date(t.departure_at);
                const arr = new Date(dep.getTime() + (4 * 60 * 60 * 1000)); // +4 часа прибытие

                res.innerHTML += `
                    <div class="ticket">
                        <div class="t-info">
                            <div><b>${dep.getHours()}:${String(dep.getMinutes()).padStart(2,'0')}</b><br>${t.origin}</div>
                            <div style="text-align:center; color:var(--tkm-green);">
                                <i class="fas fa-plane"></i><br>
                                <div class="baggage-select">
                                    <span class="bag-btn active">El ýüki</span>
                                    <span class="bag-btn">+23kg</span>
                                </div>
                            </div>
                            <div><b>${arr.getHours()}:${String(arr.getMinutes()).padStart(2,'0')}</b><br>${t.destination}</div>
                        </div>
                        <div class="t-buy">
                            <div style="font-size:24px; font-weight:bold;">${price.toLocaleString()} RUB</div>
                            <button onclick="alert('Kwitansiýa taýýar!')" style="background:#d32f2f; color:white; border:none; width:100%; padding:10px; margin-top:10px; cursor:pointer; font-weight:bold;">SATYN AL</button>
                        </div>
                    </div>`;
            });
        } catch(e) { res.innerHTML = "Error!"; }
    }
</script>
</body>
</html>
