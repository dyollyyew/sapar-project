<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Bilet Gözlegi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --tkm-red-grad: linear-gradient(180deg, #a80000 0%, #660000 100%);
            --tkm-green: #2ecc71;
            --sidebar-w: 300px;
        }
        
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 0; display: flex; height: 100vh; background: #fdfdfd;
        }

        /* КРАСНЫЙ ГРАДИЕНТ БОКОВОЙ ПАНЕЛИ */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--tkm-red-grad);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .sidebar h2 { border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 10px; }

        .menu-section { margin-bottom: 30px; }
        .menu-section h4 { color: #ff9999; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .menu-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px 0; 
            cursor: pointer; transition: 0.3s; color: #eee; text-decoration: none;
        }
        .menu-item:hover { color: white; padding-left: 5px; }

        /* ОСНОВНАЯ ЧАСТЬ */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

        header {
            background: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo-box { font-size: 28px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo-box i { color: #a80000; }

        /* САМОЛЕТ */
        .sky-line { background: #f0f0f0; height: 35px; position: relative; overflow: hidden; border-bottom: 1px solid #ddd; }
        .plane-anim { 
            position: absolute; white-space: nowrap; font-weight: bold; color: #666;
            animation: fly 12s linear infinite; top: 8px;
        }
        @keyframes fly { from { left: -200px; } to { left: 100%; } }

        /* ФОРМА */
        .container { padding: 40px; max-width: 900px; }
        .search-card {
            background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; gap: 15px; align-items: flex-end;
        }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 16px; }

        /* КНОПКА С АВТО-БЛОКИРОВКОЙ */
        .btn-search {
            background: var(--tkm-green); color: white; border: none; padding: 13px 30px;
            font-weight: bold; border-radius: 6px; cursor: pointer; font-family: inherit;
        }
        .btn-search:disabled { background: #ccc; cursor: not-allowed; }

        /* БИЛЕТ */
        .ticket {
            background: white; margin-top: 20px; border: 1px solid #eee; display: flex;
            border-radius: 8px; overflow: hidden; transition: 0.3s;
        }
        .ticket:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .ticket-left { flex: 3; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .ticket-right { flex: 1; background: #fafafa; border-left: 1px dashed #ddd; padding: 25px; text-align: center; }

        .admin-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; font-size: 14px; }
        .admin-box input { width: 100%; margin: 5px 0; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>SAPAR.TM</h2>
    
    <div class="menu-section">
        <h4>Passenger Area</h4>
        <a href="#" class="menu-item"><i class="fas fa-user"></i> My Profile</a>
        <a href="#" class="menu-item"><i class="fas fa-ticket-alt"></i> My Tickets</a>
    </div>

    <div class="menu-section">
        <h4>Admin Panel</h4>
        <div class="admin-box">
            <input type="text" placeholder="Login" id="admL">
            <input type="password" placeholder="Password" id="admP">
            <button onclick="checkAdmin()" style="width:100%; cursor:pointer; background:#fff; border:none; margin-top:5px; font-weight:bold; height:25px;">Login</button>
        </div>
    </div>
</div>

<div class="main">
    <header>
        <div class="logo-box"><i class="fas fa-paper-plane"></i> SAPAR<span>.TM</span></div>
        <div>
            <span style="cursor:pointer; font-weight:bold; color:#a80000" onclick="setLng('tk')">TKM</span> | 
            <span style="cursor:pointer; font-weight:bold;" onclick="setLng('ru')">РУС</span>
        </div>
    </header>

    <div class="sky-line">
        <div class="plane-anim"><i class="fas fa-plane"></i> Turkmenistan Airlines — Bagtly ýollar dileýäris!</div>
    </div>

    <div class="container">
        <div class="search-card">
            <div class="input-group">
                <label>Nireden</label>
                <input type="text" id="from" placeholder="MOW" oninput="validateForm()">
            </div>
            <div class="input-group">
                <label>Nirä</label>
                <input type="text" id="to" placeholder="ASB" oninput="validateForm()">
            </div>
            <div class="input-group">
                <label>Sene</label>
                <input type="date" id="date" oninput="validateForm()">
            </div>
            <button class="btn-search" id="searchBtn" onclick="runSearch()" disabled>GÖZLEG</button>
        </div>

        <div id="results"></div>
    </div>
</div>

<script>
    // Проверка заполнения полей
    function validateForm() {
        const from = document.getElementById('from').value;
        const to = document.getElementById('to').value;
        const date = document.getElementById('date').value;
        const btn = document.getElementById('searchBtn');
        
        // Кнопка включится только если все 3 поля заполнены
        btn.disabled = !(from && to && date);
    }

    async function runSearch() {
        const from = document.getElementById('from').value.toUpperCase();
        const to = document.getElementById('to').value.toUpperCase();
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('results');

        resDiv.innerHTML = "<div style='text-align:center; padding:30px;'>Gözlenilýär...</div>";

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resDiv.innerHTML = "";

            data.tickets.forEach(t => {
                const priceWithComm = Math.round(t.price * 1.05); // +5%
                const d = new Date(t.departure_at);
                const time = d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0');

                resDiv.innerHTML += `
                    <div class="ticket">
                        <div class="ticket-left">
                            <div><b>${time}</b><br><small>${t.origin}</small></div>
                            <div style="color:#a80000"><i class="fas fa-long-arrow-alt-right"></i></div>
                            <div><b>--:--</b><br><small>${t.destination}</small></div>
                        </div>
                        <div class="ticket-right">
                            <div style="font-size:20px; font-weight:bold;">${priceWithComm.toLocaleString()} RUB</div>
                            <button onclick="alert('Receipt created!')" style="background:#a80000; color:white; border:none; width:100%; padding:8px; margin-top:10px; cursor:pointer; font-weight:bold;">BUY</button>
                        </div>
                    </div>`;
            });
        } catch(e) { resDiv.innerHTML = "Error!"; }
    }

    function checkAdmin() {
        const p = document.getElementById('admP').value;
        if(p === "admin123") alert("Welcome, Admin!");
        else alert("Wrong password!");
    }
</script>
</body>
</html>
