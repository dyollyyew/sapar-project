<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #27ae60; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        header { background: white; padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .logo { font-size: 24px; font-weight: bold; color: var(--dark); display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo i { color: var(--green); }
        
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            height: 300px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; text-align: center;
        }
        .hero h2 { font-size: 36px; margin: 0; font-weight: 800; }

        .search-box { 
            max-width: 1000px; margin: -50px auto 20px; background: white; 
            padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; position: relative; }
        .input-group label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; }
        .input-group input { padding: 12px 12px 12px 40px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; min-width: 180px; }
        .input-group i { position: absolute; left: 12px; top: 32px; color: var(--green); }
        
        .gozleg-btn { background: var(--green); color: white; border: none; padding: 12px 35px; border-radius: 8px; font-weight: bold; cursor: pointer; align-self: flex-end; font-size: 16px; }
        
        #res { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .ticket { background: white; padding: 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo"><i class="fa-solid fa-paper-plane"></i> SAPAR.TM</a>
</header>

<div class="hero">
    <h2>Gyzykly syýahatlar diňe biziň bilen</h2>
    <p>Dünýäniň ähli künjegine uçuşlar</p>
</div>

<div class="search-box">
    <div class="input-group">
        <label>Nireden</label>
        <i class="fa-solid fa-plane-departure"></i>
        <input type="text" id="from" value="ASB">
    </div>
    <div class="input-group">
        <label>Nirä</label>
        <i class="fa-solid fa-plane-arrival"></i>
        <input type="text" id="to" value="KZN">
    </div>
    <div class="input-group">
        <label>Sene</label>
        <i class="fa-solid fa-calendar-days"></i>
        <input type="date" id="date">
    </div>
    <button class="gozleg-btn" onclick="searchTickets()">GOZLEG</button>
</div>

<div id="res"></div>

<script>
    async function searchTickets() {
        const from = document.getElementById('from').value.trim().toUpperCase();
        const to = document.getElementById('to').value.trim().toUpperCase();
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('res');

        if (!from || !to || !date) {
            alert("Dolduryň!");
            return;
        }

        resDiv.innerHTML = "<p style='text-align:center;'>Garaşyň...</p>";

        try {
            // ТАК КАК СЕРВЕР В ГЛАВНОЙ ПАПКЕ, А INDEX В ПОДПАПКЕ:
            // Используем прямой путь к API на том же хосте
            const response = await fetch(`/api/search-live?origin=${from}&destination=${to}&date=${date}`);
            
            if (!response.ok) throw new Error("Сервер не отвечает");

            const data = await response.json();
            resDiv.innerHTML = "";

            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    resDiv.innerHTML += `
                        <div class="ticket">
                            <div>
                                <strong>${t.airline || 'Avia'}</strong><br>
                                <small>${t.origin} ➔ ${t.destination}</small>
                            </div>
                            <div style="text-align:right">
                                <div style="color:#27ae60; font-weight:bold; font-size:20px;">${t.price} TMT</div>
                                <a href="${t.link}" target="_blank" style="background:#27ae60; color:white; padding:5px 10px; border-radius:5px; text-decoration:none; font-size:12px;">Satyn al</a>
                            </div>
                        </div>`;
                });
            } else {
                resDiv.innerHTML = "<p style='text-align:center;'>Bilet tapylmady.</p>";
            }
        } catch (e) {
            resDiv.innerHTML = "<p style='text-align:center; color:red; font-weight:bold;'>Ошибка соединения с сервером!</p>";
            console.error(e);
        }
    }
</script>
</body>
</html>
