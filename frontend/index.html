<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Счастливого пути!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #27ae60;
            --header-bg: #f2f5f8;
            --gold: #d4af37;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; }

        /* Шапка по скриншоту: серый фон, черный текст, зеленый лого */
        header {
            background: var(--header-bg); 
            padding: 15px 10%; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo { font-size: 28px; font-weight: 900; display: flex; align-items: center; gap: 12px; color: #000; }
        .logo i { color: var(--primary-green); font-size: 32px; }

        .lang-switcher button { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .lang-switcher button.active { background: #1e293b; color: white; }

        /* БЛОК С ТВОИМ КОВРОМ */
        .hero {
            position: relative;
            /* Вставляем ковер напрямую. Если ссылка опять упадет, просто замени URL на свой путь к файлу */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://i.ibb.co/L9H8S6f/original-image.png'); 
            background-size: cover;
            background-position: center;
            padding: 120px 20px 180px; 
            text-align: center; 
            color: white;
            border-bottom: 5px solid var(--gold);
        }
        
        .hero h2 { font-size: 52px; margin: 0; font-weight: 900; text-shadow: 2px 4px 15px rgba(0,0,0,0.8); }
        .hero p { font-size: 22px; margin-top: 10px; opacity: 0.9; text-shadow: 1px 2px 8px rgba(0,0,0,0.6); }

        /* КАРТОЧКА ПОИСКА */
        .search-container { max-width: 1100px; margin: -100px auto 50px; padding: 0 20px; }
        .search-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)) auto; gap: 20px;
        }

        .input-group label { display: block; margin-bottom: 10px; font-size: 13px; font-weight: 800; color: #64748b; }
        .input-group { position: relative; }
        .input-group input {
            width: 100%; padding: 15px 15px 15px 50px; border: 2px solid #f1f5f9;
            border-radius: 12px; font-size: 16px; box-sizing: border-box;
        }
        .input-group i { position: absolute; left: 18px; top: 43px; color: var(--primary-green); font-size: 20px; }

        .btn-search {
            background: var(--primary-green); color: white; border: none;
            padding: 0 50px; border-radius: 12px; font-weight: 900;
            cursor: pointer; height: 60px; font-size: 18px; transition: 0.3s;
        }
        .btn-search:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3); }

        /* Результаты поиска */
        .ticket {
            background: white; border-radius: 20px; display: flex; margin-bottom: 25px;
            border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fa-solid fa-paper-plane"></i> SAPAR.TM</div>
    <div class="lang-switcher">
        <button onclick="setLang('ru')" id="btn-ru" class="active">RU</button>
        <button onclick="setLang('tm')" id="btn-tm">TM</button>
        <button onclick="setLang('en')" id="btn-en">EN</button>
    </div>
</header>

<div class="hero">
    <h2 id="hero-title">Gyzykly syýahatlar biziň bile</h2>
    <p id="hero-desc">Dünýäniň ähli künjegine iň amatly uçuşlar</p>
</div>

<div class="search-container">
    <div class="search-card">
        <div class="input-group">
            <label id="lbl-from">Nireden</label>
            <i class="fa-solid fa-plane-departure"></i>
            <input type="text" id="from" placeholder="MOW" value="MOW">
        </div>
        <div class="input-group">
            <label id="lbl-to">Nirä</label>
            <i class="fa-solid fa-plane-arrival"></i>
            <input type="text" id="to" placeholder="KZN" value="KZN">
        </div>
        <div class="input-group">
            <label id="lbl-date">Sene</label>
            <i class="fa-solid fa-calendar-alt"></i>
            <input type="date" id="date">
        </div>
        <button class="btn-search" onclick="searchTickets()" id="btn-search-text">GOZLEG</button>
    </div>
    <div id="res"></div>
</div>

<script>
    // Логика остается прежней
    const translations = {
        ru: { title: "Интересные путешествия с нами", desc: "Удобный поиск билетов по всему миру", from: "Откуда", to: "Куда", date: "Дата", search: "ПОИСК", buy: "КУПИТЬ", loading: "Ищем билеты..." },
        tm: { title: "Gyzykly syýahatlar biziň bile", desc: "Dünýäniň ähli künjegine uçuşlar", from: "Nireden", to: "Nirä", date: "Sene", search: "GOZLEG", buy: "SATYN AL", loading: "Gözlenilýär..." },
        en: { title: "Exciting journeys with us", desc: "Best prices on all flights", from: "Origin", to: "Destination", date: "Date", search: "SEARCH", buy: "BUY", loading: "Searching..." }
    };

    let currentLang = 'ru';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-switcher button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        document.getElementById('hero-title').innerText = translations[lang].title;
        document.getElementById('hero-desc').innerText = translations[lang].desc;
        document.getElementById('lbl-from').innerText = translations[lang].from;
        document.getElementById('lbl-to').innerText = translations[lang].to;
        document.getElementById('lbl-date').innerText = translations[lang].date;
        document.getElementById('btn-search-text').innerText = translations[lang].search;
    }

    async function searchTickets() {
        const resDiv = document.getElementById('res');
        resDiv.innerHTML = `<div style='text-align:center; padding:50px; color:#8b0000; font-weight:bold;'>${translations[currentLang].loading}</div>`;
        // Здесь твоя логика fetch...
    }
</script>
</body>
</html>
