<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM — Официальные авиабилеты</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f3; margin: 0; }
        .nav { background: #00873d; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; }
        .main-form { max-width: 800px; margin: -30px auto 20px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { font-size: 13px; color: #555; margin-bottom: 5px; display: block; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .find-btn { width: 100%; background: #ff5e62; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .find-btn:hover { background: #ff4145; }
        .ticket-card { background: white; max-width: 800px; margin: 15px auto; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid #00873d; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .price-tag { font-size: 24px; color: #00873d; font-weight: bold; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div class="nav">SAPAR.TM</div>
<div style="height: 100px; background: #00873d;"></div>

<div class="main-form">
    <div class="grid">
        <div>
            <label>Nireden (Откуда)</label>
            <select id="from"></select>
        </div>
        <div>
            <label>Nirä (Куда)</label>
            <select id="to"></select>
        </div>
        <div>
            <label>Ýolagçy (Кто летит)</label>
            <select id="pass">
                <option>1 Взрослый</option>
                <option>2 Взрослых</option>
            </select>
        </div>
    </div>
    <div class="grid">
        <div>
            <label>Gidýän güni (Туда)</label>
            <input type="date" id="dateStart">
        </div>
        <div>
            <label>Gaýdýan güni (Обратно)</label>
            <input type="date" id="dateEnd">
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="find-btn" onclick="search()">TAP (НАЙТИ)</button>
        </div>
    </div>
</div>

<div id="results"></div>

<div id="modal">
    <div style="background:white; padding:30px; border-radius:15px; width:350px;">
        <h3>Satyn almak</h3>
        <input type="hidden" id="tId">
        <input type="text" id="pName" placeholder="Adyňyz we Familiýaňyz" style="margin-bottom:10px;">
        <input type="text" id="pDoc" placeholder="Pasport belgiňiz" style="margin-bottom:10px;">
        <button class="find-btn" onclick="bookNow()">TASSYKLAMAK</button>
        <button onclick="closeModal()" style="width:100%; margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Yza</button>
    </div>
</div>

<script>
    const API = 'https://sapar-project-production.up.railway.app';

    window.onload = async () => {
        document.getElementById('dateStart').value = "2026-04-05";
        const res = await fetch(`${API}/api/cities`);
        const cities = await res.json();
        const f = document.getElementById('from'), t = document.getElementById('to');
        cities.forEach(c => {
            f.add(new Option(c, c));
            t.add(new Option(c, c));
        });
    };

    async function search() {
        const f = document.getElementById('from').value, 
              t = document.getElementById('to').value, 
              d = document.getElementById('dateStart').value;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = '<p style="text-align:center">Biletler gözlenýär...</p>';

        const res = await fetch(`${API}/api/search?from=${f}&to=${t}&date=${d}`);
        const data = await res.json();
        
        resDiv.innerHTML = data.length ? '' : '<p style="text-align:center">Bu senede bilet tapylmady.</p>';
        data.forEach(ticket => {
            resDiv.innerHTML += `
            <div class="ticket-card">
                <div>
                    <span style="font-size:22px; font-weight:bold;">${ticket.time}</span><br>
                    <span style="color:#666;">${ticket.airline}</span>
                </div>
                <div style="text-align:right">
                    <div class="price-tag">${ticket.price} TMT</div>
                    <button onclick="openModal(${ticket.id})" style="padding:8px 20px; background:#00873d; color:white; border:none; border-radius:5px; cursor:pointer;">ALMAK</button>
                </div>
            </div>`;
        });
    }

    function openModal(id) { document.getElementById('tId').value = id; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function bookNow() {
        const name = document.getElementById('pName').value;
        const doc = document.getElementById('pDoc').value;
        const res = await fetch(`${API}/api/book`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ trip_id: document.getElementById('tId').value, name, passport: doc })
        });
        const result = await res.json();
        if(result.success) { alert("Sapar.tm: Bilet üstünlikli alyndy!"); closeModal(); }
    }
</script>
</body>
</html>
