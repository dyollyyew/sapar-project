<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SAPAR.TM - Поиск билетов</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 400px; }
        h1 { text-align: center; color: #0052cc; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #0052cc; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background: #003d99; }
        #res { margin-top: 20px; }
        .ticket { border-left: 4px solid #0052cc; background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .price { color: #27ae60; font-size: 1.2em; font-weight: bold; }
        .buy-btn { display: block; text-align: center; background: #f39c12; color: white; padding: 8px; margin-top: 10px; text-decoration: none; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SAPAR.TM</h1>
        <input type="text" id="from" placeholder="Откуда (например, ASB)" value="ASB">
        <input type="text" id="to" placeholder="Куда (например, KZN)" value="KZN">
        <input type="date" id="date">
        <button onclick="search()">НАЙТИ БИЛЕТЫ</button>
        <div id="res"></div>
    </div>

    <script>
        async function search() {
            const resDiv = document.getElementById('res');
            const from = document.getElementById('from').value.trim().toUpperCase();
            const to = document.getElementById('to').value.trim().toUpperCase();
            const date = document.getElementById('date').value;

            if (!date) return alert("Выбери дату!");
            resDiv.innerHTML = "🔍 Ищем лучшие варианты...";

            try {
                const response = await fetch('/api/search-live', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ origin: from, destination: to, date: date })
                });

                const data = await response.json();
                resDiv.innerHTML = "";

                if (data.tickets && data.tickets.length > 0) {
                    data.tickets.forEach(t => {
                        resDiv.innerHTML += `
                            <div class="ticket">
                                <div class="price">${t.price} RUB</div>
                                <div>Рейс: ${t.origin} ➔ ${t.destination}</div>
                                <div style="font-size: 0.8em; color: #666;">Авиакомпания: ${t.airline}</div>
                                <a class="buy-btn" href="https://www.aviasales.ru${t.link}" target="_blank">КУПИТЬ БИЛЕТ</a>
                            </div>
                        `;
                    });
                } else {
                    resDiv.innerHTML = "☹️ Билетов не найдено.";
                }
            } catch (e) {
                resDiv.innerHTML = "<span style='color:red;'>Ошибка связи с сервером</span>";
            }
        }
    </script>
</body>
</html>
