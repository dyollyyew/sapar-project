<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Bilet Gözlegi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7f8;
            color: #333;
        }

        /* ШАПКА */
        header {
            background: #ffffff;
            padding: 15px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-size: 26px;
            font-weight: bold;
            color: #1a1a1a;
        }
        .logo i { color: #2ecc71; font-size: 24px; }
        .logo span { color: #2ecc71; }

        .lang-picker { display: flex; gap: 8px; }
        .lang-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.2s;
        }
        .lang-btn:hover { background: #f0f0f0; border-color: #2ecc71; }
        .lang-btn.active { background: #2ecc71; color: white; border-color: #2ecc71; }

        /* КОНТЕЙНЕР */
        .container {
            max-width: 950px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* КАРТОЧКА ПОИСКА */
        .search-box {
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 20px;
            align-items: flex-end;
            border: 1px solid #eee;
        }

        .input-item { flex: 1; display: flex; flex-direction: column; }
        .input-item label { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #666; }
        .input-item input { 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 16px; 
            font-family: inherit;
            outline: none;
        }
        .input-item input:focus { border-color: #2ecc71; }

        .btn-find {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .btn-find:hover { background: #27ae60; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2); }

        /* ДИЗАЙН БИЛЕТА */
        .ticket-card {
            background: #fff;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
            display: flex;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .ticket-main { flex: 3; padding: 25px; display: flex; align-items: center; justify-content: space-around; }
        
        .city-info { text-align: center; }
        .city-info .time { font-size: 30px; font-weight: bold; color: #000; }
        .city-info .code { font-size: 15px; color: #888; font-weight: bold; margin-top: 5px; }

        .flight-path { flex: 1; text-align: center; margin: 0 30px; position: relative; }
        .flight-path .line { height: 1px; background: #ddd; width: 100%; position: absolute; top: 50%; left: 0; }
        .flight-path i { position: relative; background: #fff; padding: 0 10px; color: #2ecc71; font-size: 18px; z-index: 1; }

        .ticket-side { 
            flex: 1; 
            background: #fafafa; 
            border-left: 1px dashed #ddd; 
            padding: 25px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }
        .price-tag { font-size: 24px; font-weight: bold; color: #000; margin-bottom: 12px; }
        .buy-now { 
            background: #ff4757; 
            color: white; 
            text-decoration: none; 
            padding: 10px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 14px;
        }

        .msg { text-align: center; padding: 50px; color: #999; font-style: italic; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">
        <i class="fas fa-plane"></i> SAPAR<span>.TM</span>
    </a>
    <div class="lang-picker">
        <button class="lang-btn active" id="btn-tk" onclick="setLanguage('tk')">TKM</button>
        <button class="lang-btn" id="btn-ru" onclick="setLanguage('ru')">РУС</button>
        <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">ENG</button>
    </div>
</header>

<div class="container">
    <div class="search-box">
        <div class="input-item">
            <label id="lbl-from">Nireden</label>
            <input type="text" id="from" value="MOW">
        </div>
        <div class="input-item">
            <label id="lbl-to">Nirä</label>
            <input type="text" id="to" value="ASB">
        </div>
        <div class="input-item">
            <label id="lbl-date">Sene</label>
            <input type="date" id="date">
        </div>
        <button class="btn-find" id="main-btn" onclick="searchFlights()">GÖZLEG</button>
    </div>

    <div id="results"></div>
</div>

<script>
    const langData = {
        tk: { from: "Nireden", to: "Nirä", date: "Sene", btn: "GÖZLEG", loading: "Gözlenilýär...", buy: "SATYN AL", empty: "Bilet tapylmady" },
        ru: { from: "Откуда", to: "Куда", date: "Дата", btn: "ПОИСК", loading: "Загрузка...", buy: "КУПИТЬ", empty: "Билетов не найдено" },
        en: { from: "From", to: "To", date: "Date", btn: "SEARCH", loading: "Searching...", buy: "BUY NOW", empty: "No flights found" }
    };

    let activeLang = 'tk';

    function setLanguage(l) {
        activeLang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + l).classList.add('active');
        
        document.getElementById('lbl-from').innerText = langData[l].from;
        document.getElementById('lbl-to').innerText = langData[l].to;
        document.getElementById('lbl-date').innerText = langData[l].date;
        document.getElementById('main-btn').innerText = langData[l].btn;
    }

    // ЛОГИКА И СОЕДИНЕНИЕ НЕ ТРОНУТЫ
    async function searchFlights() {
        const from = document.getElementById('from').value.toUpperCase();
        const to = document.getElementById('to').value.toUpperCase();
        const date = document.getElementById('date').value;
        const res = document.getElementById('results');

        res.innerHTML = `<div class="msg">${langData[activeLang].loading}</div>`;

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });

            const data = await response.json();
            res.innerHTML = "";

            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    const d = new Date(t.departure_at);
                    const time = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');

                    res.innerHTML += `
                        <div class="ticket-card">
                            <div class="ticket-main">
                                <div class="city-info"><div class="time">${time}</div><div class="code">${t.origin}</div></div>
                                <div class="flight-path"><div class="line"></div><i class="fas fa-plane"></i></div>
                                <div class="city-info"><div class="time">--:--</div><div class="code">${t.destination}</div></div>
                            </div>
                            <div class="ticket-side">
                                <div class="price-tag">${t.price.toLocaleString()} RUB</div>
                                <a href="https://www.aviasales.ru${t.link}" target="_blank" class="buy-now">${langData[activeLang].buy}</a>
                            </div>
                        </div>`;
                });
            } else {
                resDiv.innerHTML = `<div class="msg">${langData[activeLang].empty}</div>`;
            }
        } catch (e) { res.innerHTML = '<div class="msg">Error connecting to server.</div>'; }
    }
</script>
</body>
</html>
