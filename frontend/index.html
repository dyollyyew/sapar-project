<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPARTM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { --green: #008755; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }

        /* Header & Logo */
        header { 
            background: #fff; padding: 12px 8%; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
        }
        .logo { font-size: 24px; font-weight: 800; color: var(--green); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .lang-switcher span { cursor: pointer; font-size: 14px; font-weight: bold; color: #999; padding: 2px 5px; }
        .lang-switcher span.active { color: var(--green); border-bottom: 2px solid var(--green); }
        .btn-login { padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* Hero */
        .hero { background: var(--green); height: 180px; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        
        /* Search Box */
        .search-container { max-width: 1100px; margin: -50px auto 40px; padding: 0 20px; }
        .search-card { 
            background: #fff; padding: 25px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: grid; 
            grid-template-columns: 1fr 40px 1fr 1fr auto; align-items: end; gap: 15px;
        }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; }
        .field input { padding: 12px; border: 1px solid #eee; border-radius: 8px; font-size: 15px; outline: none; }
        .swap-btn { background: none; border: none; color: var(--green); cursor: pointer; font-size: 18px; margin-bottom: 10px; transition: 0.3s; }
        .swap-btn:hover { transform: rotate(180deg); }
        .btn-find { background: var(--green); color: #fff; border: none; padding: 0 35px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 45px; }

        /* Popular Section */
        .popular { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .dest-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .dest-card img { width: 100%; height: 140px; object-fit: cover; }
        .dest-card p { padding: 12px; font-weight: 600; margin: 0; font-size: 14px; }

        /* Ticket Design */
        .ticket { 
            background: #fff; border-radius: 12px; padding: 25px; margin: 20px auto; 
            max-width: 900px; border: 1px solid #e0e0e0; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .ticket-header { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .ticket-route { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #333; }
        .ticket-grid { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; padding: 15px 0; border-top: 1px solid #f5f5f5; }
        .t-lbl { color: #aaa; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; }
        .t-val { font-size: 17px; font-weight: bold; }
        .ticket-footer { display: flex; justify-content: flex-end; align-items: center; gap: 30px; margin-top: 20px; border-top: 1px solid #f5f5f5; padding-top: 20px; }
        .price { font-size: 28px; font-weight: bold; color: var(--green); }
        .btn-book { background: var(--green); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-book:hover { opacity: 0.9; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo"><i class="fas fa-paper-plane"></i> SAPARTM</a>
    <div class="nav-right">
        <div class="lang-switcher">
            <span id="lang-tkm" onclick="changeLang('tkm')">TKM</span> | 
            <span id="lang-rus" class="active" onclick="changeLang('rus')">РУС</span>
        </div>
        <button class="btn-login"><i class="fas fa-user-circle"></i> <span id="txt-login">Giriş</span></button>
    </div>
</header>

<div class="hero"><h1 id="txt-welcome">HOŞ GELDIŇIZ!</h1></div>

<div class="search-container">
    <div class="search-card">
        <div class="field">
            <label id="lbl-from">Nireden</label>
            <input type="text" id="fromCity" placeholder="Aşgabat">
        </div>
        <button class="swap-btn" onclick="swapCities()"><i class="fas fa-exchange-alt"></i></button>
        <div class="field">
            <label id="lbl-to">Nirä</label>
            <input type="text" id="toCity" placeholder="Stambul">
        </div>
        <div class="field">
            <label id="lbl-date">Sene</label>
            <input type="text" id="dateInput" placeholder="12.04.2026">
        </div>
        <button class="btn-find" onclick="findFlight()" id="btn-search">GÖZLEG</button>
    </div>
</div>

<div class="popular" id="popular-section">
    <h2 id="txt-popular" style="text-align: center; margin-bottom: 30px;">Meşhur ugurlar</h2>
    <div class="grid">
        <div class="dest-card"><img src="img/stambul.jpg" alt="Stambul"><p>Aşgabat — Stambul</p></div>
        <div class="dest-card"><img src="img/moscow.jpg" alt="Moskwa"><p>Aşgabat — Moskwa</p></div>
        <div class="dest-card"><img src="img/dubai.jpg" alt="Dubaý"><p>Aşgabat — Dubaý</p></div>
        <div class="dest-card"><img src="img/kazan.jpg" alt="Kazan"><p>Aşgabat — Kazan</p></div>
    </div>
</div>

<div id="resultsArea"></div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="logic.js"></script>
</body>
</html>
