<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPARTM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { --green: #008755; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: #fff; padding: 10px 8%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 24px; font-weight: bold; color: var(--green); text-decoration: none; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .lang-switcher span { cursor: pointer; padding: 5px 10px; font-weight: bold; color: #888; border-radius: 5px; }
        .lang-switcher span.active { background: var(--green); color: #fff; }
        .user-btn { cursor: pointer; background: #eee; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .hero { background: var(--green); height: 120px; }
        .search-container { max-width: 1000px; margin: -50px auto 20px; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: grid; grid-template-columns: 1fr auto 1fr 1fr auto; gap: 15px; align-items: end; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; }
        .field input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; width: 100%; box-sizing: border-box; }
        .btn-search { background: var(--green); color: #fff; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 48px; }
        .popular { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .dest-card { background: #fff; border-radius: 12px; overflow: hidden; cursor: pointer; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .dest-card img { width: 100%; height: 110px; object-fit: cover; }
        .dest-card p { padding: 10px; font-weight: bold; margin: 0; }
        .ticket { background: #fff; border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .badge { position: absolute; top: 0; left: 0; padding: 4px 12px; font-size: 11px; color: #fff; border-radius: 0 0 10px 0; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 300px; text-align: center; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">SAPARTM</a>
    <div class="nav-right">
        <div class="lang-switcher">
            <span id="l-tk" class="active" onclick="setLanguage('tk')">TKM</span>
            <span id="l-ru" onclick="setLanguage('ru')">РУС</span>
        </div>
        <div class="user-btn" onclick="openProfile()">
            <i class="fas fa-user-circle"></i> <span id="user-name">Profil</span>
        </div>
    </div>
</header>

<div class="hero"></div>

<div class="search-container">
    <div class="field">
        <label id="lbl-from">Nireden</label>
        <input type="text" id="from" placeholder="MOW" value="KZN">
    </div>
    <div style="cursor:pointer; padding-bottom:10px;" onclick="swapCities()">⇄</div>
    <div class="field">
        <label id="lbl-to">Nirä</label>
        <input type="text" id="to" placeholder="ASB" value="ASB">
    </div>
    <div class="field">
        <label id="lbl-date">Sene</label>
        <input type="text" id="date">
    </div>
    <button class="btn-search" onclick="doSearch()" id="btn-text">GÖZLEG</button>
</div>

<div id="results" style="max-width: 800px; margin: 0 auto 50px;"></div>

<div class="popular" id="popular">
    <h2 id="pop-title" style="text-align: center; margin-bottom: 25px;">Meşhur ugurlar</h2>
    <div class="grid">
        <div class="dest-card" onclick="goQuick('ASB','IST')"><img src="img/ist.jpg"><p>Stambul</p></div>
        <div class="dest-card" onclick="goQuick('ASB','MOW')"><img src="img/mow.jpg"><p>Moskwa</p></div>
        <div class="dest-card" onclick="goQuick('ASB','DXB')"><img src="img/dxb.jpg"><p>Dubaý</p></div>
        <div class="dest-card" onclick="goQuick('ASB','KZN')"><img src="img/kzn.jpg"><p>Kazan</p></div>
    </div>
</div>

<div id="pop-up" class="modal">
    <div class="modal-content">
        <h3 id="pop-h">Profil</h3>
        <input type="text" id="in-name" placeholder="Adyňyz" style="width:90%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
        <button class="btn-search" onclick="saveMe()" style="width:100%">OK</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="logic.js"></script>
</body>
</html>
