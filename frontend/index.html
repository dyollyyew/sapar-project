<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Sapar Airlines Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
/* Эффект Glassmorphism для формы поиска */
.search-card {
    background: rgba(255, 255, 255, 0.85) !important;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

/* Стили для популярных направлений */
.popular-title {
    text-align: center;
    color: var(--tkm-dark);
    margin: 40px 0 20px;
    font-weight: 800;
}

.popular-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto 40px;
    padding: 0 20px;
}

.city-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    cursor: pointer;
    transition: 0.4s;
    position: relative;
}

.city-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,135,85,0.2);
}

.city-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.city-overlay {
    padding: 15px;
    background: white;
    text-align: center;
}

.city-overlay h3 {
    margin: 0;
    color: var(--tkm-dark);
}

/* Анимация плавного появления */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.popular-grid, .ticket-item {
    animation: fadeInUp 0.8s ease-out forwards;
}</style>
</head>
<body>

<header>
    <div class="logo-area">
        <i class="fas fa-paper-plane" style="color:var(--tkm-green); font-size: 24px;"></i>
        <div class="logo-text">Sapar<span style="color:var(--gold)">Airlines</span></div>
    </div>
    <div class="lang-btns">
        <button onclick="changeLang('tk')">TKM</button>
        <button onclick="changeLang('ru')">РУС</button>
    </div>
</header>

<div class="hero-banner">
    <h1>HOŞ GELDIŇIZ! / WELCOME</h1>
    <p>Aşgabat — Dünýäniň gapysy</p>
</div>

<div class="search-section">
    <h2 class="popular-title" data-i18n="popularTitle">Meşhur ugurlar / Популярные направления</h2>

<div class="popular-grid">
    <div class="city-card" onclick="setQuickSearch('ASB', 'IST')">
        <img src="https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?w=400" alt="Istanbul">
        <div class="city-overlay">
            <h3>Aşgabat — Stambul</h3>
        </div>
    </div>
    <div class="city-card" onclick="setQuickSearch('ASB', 'DME')">
        <img src="https://images.unsplash.com/photo-1513326738677-b964603b136d?w=400" alt="Moscow">
        <div class="city-overlay">
            <h3>Aşgabat — Moskwa</h3>
        </div>
    </div>
    <div class="city-card" onclick="setQuickSearch('ASB', 'DXB')">
        <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=400" alt="Dubai">
        <div class="city-overlay">
            <h3>Aşgabat — Dubaý</h3>
        </div>
    </div>
</div>
    <div class="search-card">
        <div class="input-field">
            <label>Nireden (From)</label>
            <input type="text" id="from" value="MOW">
        </div>
        <div class="input-field">
            <label>Nirä (To)</label>
            <input type="text" id="to" value="ASB">
        </div>
        <div class="input-field">
            <label>Sene (Date)</label>
            <input type="date" id="date">
        </div>
        <button class="search-btn" onclick="runSearch()">Gözleg (Search)</button>
    </div>
</div>

<div class="results-container" id="results-list">
    </div>

<script src="logic.js"></script>
</body>
</html>
