<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Premium Travel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tkm-green: #00563b; --tkm-gold: #c5a059; --bg: #f5f7f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; transition: 0.3s; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--tkm-green); color: white; padding: 25px; display: flex; flex-direction: column; z-index: 10; }
        .brand { font-size: 24px; font-weight: bold; margin-bottom: 40px; border-bottom: 2px solid var(--tkm-gold); padding-bottom: 10px; }
        .nav-link { padding: 15px; color: white; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: var(--tkm-gold); }

        /* Main Content */
        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
        .top-bar { background: white; padding: 15px 30px; display: flex; justify-content: flex-end; gap: 20px; border-bottom: 1px solid #ddd; align-items: center; }
        .page { display: none; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Модальные окна */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-card { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }

        /* Dashboard Layout */
        .dashboard-layout { display: flex; gap: 25px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .nav-menu { width: 220px; background: white; border-radius: 15px; padding: 10px; height: fit-content; border: 1px solid #eee; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 10px; display: flex; align-items: center; gap: 10px; color: #555; transition: 0.2s; margin-bottom: 5px; }
        .nav-item:hover { background: #f0f7f4; color: var(--tkm-green); }
        .nav-item.active { background: var(--tkm-green); color: white; }
        .content-card { flex: 1; background: white; border-radius: 15px; padding: 30px; border: 1px solid #eee; min-height: 400px; }

        /* Tickets & Search */
        .hero { background: var(--tkm-green); color: white; padding: 60px 20px; text-align: center; }
        .search-box { background: white; padding: 25px; border-radius: 15px; display: flex; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: -40px auto 30px; max-width: 900px; }
        .ticket { background: white; margin: 15px 0; border-radius: 12px; display: flex; border: 1px solid #eee; overflow: hidden; }
        .ticket-info { flex: 1; padding: 20px; display: flex; justify-content: space-around; align-items: center; }
        .ticket-buy { width: 180px; padding: 20px; background: #fafafa; border-left: 1px dashed #ccc; text-align: center; }
        .btn-primary { background: var(--tkm-green); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-modal" class="modal-overlay">
    <div class="modal-card">
        <h3>Hoş geldiňiz!</h3>
        <p>Ulgama girmek üçin adyňyzy ýazyň:</p>
        <input type="text" id="login-input" placeholder="Adyňyz">
        <div class="modal-btns">
            <button class="btn-primary" onclick="confirmLogin()">Girmek</button>
            <button class="btn-primary" style="background:#ccc;" onclick="closeM('login-modal')">Bes et</button>
        </div>
    </div>
</div>

<div id="logout-modal" class="modal-overlay">
    <div class="modal-card">
        <h3>Çykyş</h3>
        <p>Siz dogrudan hem hasabyňyzdan çykmak isleýärsiňizmi?</p>
        <div class="modal-btns">
            <button class="btn-primary" style="background:#e74c3c;" onclick="confirmLogout()">Hawa, çyk</button>
            <button class="btn-primary" style="background:#ccc;" onclick="closeM('logout-modal')">Yza dön</button>
        </div>
    </div>
</div>

<div class="sidebar">
    <div class="brand">SAPAR.TM</div>
    <div class="nav-link active" onclick="showP('search-p')"><i class="fas fa-search"></i> Gözleg</div>
</div>

<div class="main">
    <div class="top-bar">
        <div id="auth-zone">
            <div id="login-btn-nav" class="btn-primary" style="padding: 8px 20px;" onclick="openM('login-modal')">Giriş</div>
            <div id="user-profile-zone" style="display: none; align-items: center; gap: 15px;">
                <b onclick="showP('account-p')" style="cursor:pointer; color: var(--tkm-green);">
                    <i class="fas fa-user-circle"></i> <span id="display-user-name"></span>
                </b>
                <span onclick="openM('logout-modal')" style="color: #e74c3c; cursor:pointer; font-size: 14px;">Çykyş</span>
            </div>
        </div>
        <div style="margin-left: 20px;">TKM | RU</div>
    </div>

    <div id="search-p" class="page active-page">
        <div class="hero"><h1>Komfortly uçuş biziň bilen</h1></div>
        <div class="search-box">
            <input type="text" id="from" placeholder="Ashgabat (ASB)">
            <input type="text" id="to" placeholder="Kazan (KZN)">
            <input type="date" id="date">
            <button class="btn-primary" onclick="searchFlights()">TAP</button>
        </div>
        <div id="results" style="max-width: 900px; margin: 0 auto; padding: 20px;"></div>
    </div>

    <div id="account-p" class="page">
        <div class="dashboard-layout">
            <div class="nav-menu">
                <div class="nav-item active" onclick="switchTab('tab-orders', this)"><i class="fas fa-shopping-bag"></i> Sargytlarym</div>
                <div class="nav-item" onclick="switchTab('tab-docs', this)"><i class="fas fa-id-card"></i> Resminamalar</div>
                <div class="nav-item" onclick="switchTab('tab-settings', this)"><i class="fas fa-cog"></i> Sazlamalar</div>
            </div>
            <div class="content-card">
                <div id="tab-orders" class="account-tab">
                    <h2>Meniň sargytlarym</h2>
                    <div id="orders-list">Sargyt tapylmady.</div>
                </div>
                <div id="tab-docs" class="account-tab" style="display:none;">
                    <h2>Resminamalar</h2>
                    <div style="display: grid; gap: 10px;">
                        <input type="text" id="doc-surname" placeholder="Familiýasy (Surname)">
                        <input type="text" id="doc-name" placeholder="Ady (Name)">
                        <input type="text" id="doc-pass" placeholder="Pasport seriýasy (I-AS 123456)">
                        <button class="btn-primary" onclick="saveDoc()">Ýatda sakla</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let myOrders = [];
    let savedUser = null;

    // ОРИГИНАЛЬНАЯ ЛОГИКА СОЕДИНЕНИЯ (БЕЗ ИЗМЕНЕНИЙ)
    async function searchFlights() {
        const from = document.getElementById('from').value;
        const to = document.getElementById('to').value;
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "Gözlenilýär...";

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resDiv.innerHTML = "";
            if(data.tickets) {
                data.tickets.forEach(t => {
                    resDiv.innerHTML += `
                        <div class="ticket">
                            <div class="ticket-info"><b>${from}</b> <i class="fas fa-plane"></i> <b>${to}</b></div>
                            <div class="ticket-buy">
                                <div style="font-weight:bold; color:var(--tkm-green)">${t.price} RUB</div>
                                <button class="btn-primary" style="width:100%; margin-top:10px" onclick="bookFlight('${from}','${to}','${t.price}')">SATYN AL</button>
                            </div>
                        </div>`;
                });
            } else { resDiv.innerHTML = "Bilet tapylmady."; }
        } catch(e) { resDiv.innerHTML = "Error!"; console.error(e); }
    }

    // ЛОГИКА АККАУНТА
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    function confirmLogin() {
        const name = document.getElementById('login-input').value;
        if(name.trim()) {
            savedUser = { name: name };
            document.getElementById('display-user-name').innerText = name;
            document.getElementById('login-btn-nav').style.display = 'none';
            document.getElementById('user-profile-zone').style.display = 'flex';
            closeM('login-modal');
        }
    }

    function confirmLogout() { location.reload(); }

    function bookFlight(f, t, p) {
        if(!savedUser) { openM('login-modal'); return; }
        const order = { f, t, p, id: 'SAP'+Math.floor(Math.random()*999) };
        myOrders.push(order);
        alert(`Sargyt kabul edildi!\n${f} -> ${t}\nBahasy: ${p} RUB`);
        renderOrders();
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        list.innerHTML = myOrders.map(o => `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${o.f} - ${o.t}</b>: ${o.p} RUB</div>`).join('');
    }

    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
    }

    function switchTab(id, el) {
        document.querySelectorAll('.account-tab').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
