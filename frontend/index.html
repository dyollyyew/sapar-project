<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR - Onlaýn Petekler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tkm-green: #008755;
            --gold: #d4af37;
            --dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; }

        /* Новая Шапка */
        header { 
            background: white; padding: 10px 8%; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .brand i { font-size: 28px; color: var(--tkm-green); transform: rotate(-45deg); }
        .brand-name { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: var(--dark); text-transform: uppercase; }
        .brand-name span { color: var(--tkm-green); }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .user-cabinet { 
            display: flex; align-items: center; gap: 8px; 
            padding: 8px 15px; border-radius: 20px; background: #f8f9fa;
            color: var(--dark); text-decoration: none; font-weight: 600; font-size: 14px;
            transition: 0.3s; border: 1px solid #ddd;
        }
        .user-cabinet:hover { background: var(--tkm-green); color: white; border-color: var(--tkm-green); }

        .lang-btns button {
            background: none; border: none; font-weight: bold; cursor: pointer; color: #888; transition: 0.3s;
        }
        .lang-btns button.active { color: var(--tkm-green); border-bottom: 2px solid var(--tkm-green); }

        /* Геро и Поиск */
        .hero { background: var(--tkm-green); padding: 50px 20px 80px; text-align: center; color: white; }
        .hero h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        .search-box { 
            max-width: 1000px; margin: -40px auto 40px; background: white; 
            padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; align-items: flex-end;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 11px; font-weight: 800; color: #777; text-transform: uppercase; }
        .input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 15px; }

        .btn-search { 
            background: var(--tkm-green); color: white; border: none; padding: 14px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        .btn-search:hover { background: var(--dark); transform: scale(1.02); }

        /* Секция направлений */
        .section-title { text-align: center; margin: 40px 0 20px; font-size: 22px; color: var(--dark); }
        .cards { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); 
    gap: 20px; 
    max-width: 1200px; 
    margin: 0 auto 50px; 
    padding: 0 20px; 
}
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; font-weight: bold; }

        /* Дизайн Билета (Улучшенный) */
        .ticket { 
            background: white; border-radius: 12px; margin: 0 auto 20px; max-width: 800px;
            display: flex; overflow: hidden; border: 1px solid #eee; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .ticket:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-color: var(--tkm-green); }
        .ticket-left { flex: 3; padding: 25px; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .ticket-right { flex: 1; background: #fcfcfc; border-left: 2px dashed #eee; padding: 25px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        
        .city-block h2 { font-size: 28px; color: var(--dark); margin: 0; }
        .city-block p { font-size: 12px; color: #888; font-weight: 600; }
        
        .flight-info { flex: 1; text-align: center; color: var(--tkm-green); }
        .flight-info i { font-size: 20px; margin-bottom: 5px; }
        .line { height: 2px; background: #eee; width: 100%; position: relative; margin: 10px 0; }
        .line::after { content: '✈'; position: absolute; top: -10px; left: 45%; background: white; padding: 0 5px; }

        .price { font-size: 22px; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
        .buy-btn { background: #e63946; color: white; text-decoration: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        
        .loader { text-align: center; padding: 50px; color: var(--tkm-green); font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <i class="fas fa-paper-plane"></i>
        <div class="brand-name" id="logo-text">SAPAR<span>TM</span></div>
    </div>
    <div class="nav-right">
        <div class="lang-btns">
            <button id="btn-tk" onclick="changeLang('tk')" class="active">TKM</button>
            <button id="btn-ru" onclick="changeLang('ru')">РУС</button>
        </div>
        <a href="#" class="user-cabinet" id="nav-cabinet">
            <i class="fas fa-user-circle"></i>
            <span id="txt-cabinet">Hasabym</span>
        </a>
    </div>
</header>

<div class="hero">
    <h1 id="hero-title">HOŞ GELDIŇIZ!</h1>
    <p id="hero-sub">Aşgabat — Dünýäniň gapysy</p>
</div>

<div class="search-box">
    <div class="input-group">
        <label id="lbl-from">Nireden</label>
        <input type="text" id="from" value="ASB">
    </div>
    <div class="input-group">
        <label id="lbl-to">Nirä</label>
        <input type="text" id="to" value="MOW">
    </div>
    <div class="input-group">
        <label id="lbl-date">Sene</label>
        <input type="date" id="date">
    </div>
    <button class="btn-search" onclick="runSearch()" id="btn-search">GÖZLEG</button>
</div>

<h2 class="section-title" id="pop-title">Meşhur ugurlar</h2>
<div class="cards">
    <div class="card" onclick="setQuickSearch('ASB', 'IST')">
        <img src="img/ist.jpg" alt="Istanbul">
        <div class="card-info">Aşgabat — Stambul</div>
    </div>
    <div class="card" onclick="setQuickSearch('ASB', 'MOW')">
        <img src="img/mow.jpg" alt="Moscow">
        <div class="card-info">Aşgabat — Moskwa</div>
    </div>
    <div class="card" onclick="setQuickSearch('ASB', 'KZN')">
        <img src="img/kzn.jpg" alt="Kazan">
        <div class="card-info">Aşgabat — Kazan</div>
    </div>
    <div class="card" onclick="setQuickSearch('ASB', 'DXB')">
        <img src="img/dxb.jpg" alt="Dubai">
        <div class="card-info">Aşgabat — Dubaý</div>
    </div>
</div>
</div>

<div id="results-list" style="padding: 0 20px 50px;"></div>

<script src="logic.js"></script>
</body>
</html>
