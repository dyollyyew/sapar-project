<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #27ae60;
            --header-bg: #f2f5f8;
            --gold: #d4af37;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; }

        header {
            background: var(--header-bg); 
            padding: 15px 10%; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo { font-size: 28px; font-weight: 900; display: flex; align-items: center; gap: 12px; color: #000; }
        .logo i { color: var(--primary-green); font-size: 32px; }

        .lang-switcher button { 
            background: white; border: 1px solid #ddd; padding: 8px 15px; 
            border-radius: 8px; cursor: pointer; font-weight: 700;
        }
        .lang-switcher button.active { background: #1e293b; color: white; }

        /* Фоновое изображение с самолетом */
        .hero {
            position: relative;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                url('https://images.unsplash.com/photo-1570710891163-6d3b5c47248b?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center;
            padding: 140px 20px 200px; 
            text-align: center; 
            color: white;
            border-bottom: 5px solid var(--gold);
        }
        
        .hero h2 { 
            font-size: 48px; 
            margin: 0; 
            font-weight: 900; 
            text-shadow: 2px 4px 10px rgba(0,0,0,0.7); 
        }

        .search-container { max-width: 1100px; margin: -100px auto 50px; padding: 0 20px; position: relative; z-index: 10; }
        .search-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)) auto; gap: 20px;
        }

        .input-group label { display: block; margin-bottom: 10px; font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .input-group input {
            width: 100%; padding: 15px 15px 15px 50px; border: 2px solid #f1f5f9;
            border-radius: 12px; font-size: 16px; box-sizing: border-box;
        }
        .input-group i { position: absolute; left: 18px; top: 43px; color: var(--primary-green); font-size: 20px; }

        .btn-search {
            background: var(--primary-green); color: white; border: none;
            padding: 0 45px; border-radius: 12px; font-weight: 900;
            cursor: pointer; height: 55px; font-size: 18px; align-self: end;
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fa-solid fa-paper-plane"></i> SAPAR.TM</div>
    <div class="lang-switcher">
        <button onclick="setLang('ru')" id="btn-ru">RU</button>
        <button onclick="setLang('tm')" id="btn-tm" class="active">TM</button>
        <button onclick="setLang('en')" id="btn-en">EN</button>
    </div>
</header>

<div class="hero">
    <h2 id="hero-title">Gyzykly syýahatlar diňe biziň bilen</h2>
    <p id="hero-desc">Dünýäniň ähli künjegine uçuşlar</p>
</div>

<div class="search-container">
    <div class="search-card">
        <div class="input-group">
            <label id="lbl-from">Nireden</label>
            <i class="fa-solid fa-plane-departure"></i>
            <input type="text" id="from" value="MOW">
        </div>
        <div class="input-group">
            <label id="lbl-to">Nirä</label>
            <i class="fa-solid fa-plane-arrival"></i>
            <input type="text" id="to" value="KZN">
        </div>
        <div class="input-group">
            <label id="lbl-date">Sene</label>
            <i class="fa-solid fa-calendar-alt"></i>
            <input type="date" id="date">
        </div>
        <button class="btn-search" onclick="searchTickets()" id="btn-search-text">GOZLEG</button>
    </div>
    <div id="res"></div>
</div>

<script>
    const translations = {
        ru: { title: "Интересные путешествия только с нами", from: "Откуда", to: "Куда", date: "Дата", search: "ПОИСК" },
        tm: { title: "Gyzykly syýahatlar diňe biziň bilen", from: "Nireden", to: "Nirä", date: "Sene", search: "GOZLEG" },
        en: { title: "Exciting journeys only with us", from: "Origin", to: "Destination", date: "Date", search: "SEARCH" }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-switcher button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        document.getElementById('hero-title').innerText = translations[lang].title;
        document.getElementById('lbl-from').innerText = translations[lang].from;
        document.getElementById('lbl-to').innerText = translations[lang].to;
        document.getElementById('lbl-date').innerText = translations[lang].date;
        document.getElementById('btn-search-text').innerText = translations[lang].search;
    }

    async function searchTickets() {
        console.log("Поиск запущен...");
    }
</script>

</body>
</html>
