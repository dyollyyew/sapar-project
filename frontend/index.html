<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPARTM - Bronirleme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { --green: #008755; --blue: #007bff; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        
        header { background: #fff; padding: 12px 8%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); sticky: top; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; color: var(--green); text-decoration: none; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .lang-switcher span { padding: 5px 12px; cursor: pointer; border-radius: 15px; font-size: 12px; font-weight: bold; background: #eee; }
        .lang-switcher span.active { background: var(--green); color: #fff; }
        .user-pill { background: #f8f9fa; border: 1px solid #ddd; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .hero { background: var(--green); height: 120px; }
        .search-container { max-width: 1100px; margin: -50px auto 30px; padding: 0 20px; }
        .search-card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: grid; grid-template-columns: 1fr 40px 1fr 1fr auto; align-items: end; gap: 12px; }
        
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label { font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; }
        .field input { padding: 12px; border: 1px solid #eee; border-radius: 10px; outline: none; }

        /* Карточка билета */
        .ticket { background: #fff; border-radius: 16px; margin-bottom: 15px; border: 1px solid #eee; position: relative; overflow: hidden; display: flex; }
        .ticket-badge { position: absolute; top: 0; left: 0; padding: 4px 12px; font-size: 11px; font-weight: 800; color: #fff; border-radius: 0 0 10px 0; }
        .cheap { background: var(--green); }
        .optimal { background: var(--blue); }
        .fast { background: #9c27b0; }

        .ticket-left { flex: 2; padding: 30px 20px; display: flex; align-items: center; justify-content: space-between; }
        .ticket-right { flex: 1; padding: 20px; border-left: 1px dashed #eee; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .price { font-size: 26px; font-weight: 900; color: #333; margin-bottom: 10px; }
        
        .buy-btn { background: var(--green); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Популярные */
        .popular { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .dest-card { background: #fff; border-radius: 12px; overflow: hidden; cursor: pointer; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .dest-card img { width: 100%; height: 120px; object-fit: cover; }

        /* ЛК и Уведомление */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 350px; }
        .toast { position: fixed; bottom: 20px; right: -300px; background: #333; color: #fff; padding: 15px 25px; border-radius: 10px; transition: 0.5s; z-index: 3000; }
        .toast.show { right: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><i class="fas fa-paper-plane"></i> SAPARTM</a>
    <div class="nav-right">
        <div class="lang-switcher">
            <span id="btn-tk" class="active" onclick="changeLang('tk')">TKM</span>
            <span id="btn-ru" onclick="changeLang('ru')">РУС</span>
        </div>
        <div class="user-pill" onclick="toggleLK()">
            <i class="fas fa-user-circle"></i> <span id="user-name-display">Profil</span>
        </div>
    </div>
</header>

<div class="hero"></div>

<div class="search-container">
    <div class="search-card">
        <div class="field">
            <label id="lbl-from">Nireden</label>
            <input type="text" id="from" placeholder="ASB">
        </div>
        <button onclick="swap()" style="background:none; border:none; color:var(--green); cursor:pointer;"><i class="fas fa-exchange-alt"></i></button>
        <div class="field">
            <label id="lbl-to">Nirä</label>
            <input type="text" id="to" placeholder="KZN">
        </div>
        <div class="field">
            <label id="lbl-date">Sene</label>
            <input type="text" id="date">
        </div>
        <button class="buy-btn" style="height:48px;" onclick="getFlights()">GÖZLEG</button>
    </div>
</div>

<div id="results" style="max-width:900px; margin: auto; padding: 0 20px;"></div>

<<div class="popular" id="popular">
    <h2 id="pop-title" style="text-align:center">Meşhur ugurlar / Популярные направления</h2>
    <div class="grid">
        <div class="dest-card" onclick="quick('ASB','IST')">
            <img src="img/ist.jpg" alt="Istanbul">
            <p>Ashgabat — Stambul</p>
        </div>
        <div class="dest-card" onclick="quick('ASB','MOW')">
            <img src="img/mow.jpg" alt="Moscow">
            <p>Ashgabat — Moskwa</p>
        </div>
        <div class="dest-card" onclick="quick('ASB','DXB')">
            <img src="img/dxb.jpg" alt="Dubai">
            <p>Ashgabat — Dubaý</p>
        </div>
        <div class="dest-card" onclick="quick('ASB','KZN')">
            <img src="img/kzn.jpg" alt="Kazan">
            <p>Ashgabat — Kazan</p>
        </div>
    </div>
</div>
<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="lk-title">Profil maglumatlary</h3>
        <input type="text" id="u-name" placeholder="Name" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="u-surname" placeholder="Surname" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="email" id="u-email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <button class="buy-btn" onclick="saveUser()">ÝAZDYR</button>
        <p onclick="toggleLK()" style="text-align:center; color:red; cursor:pointer; margin-top:15px;">Yapmak</p>
    </div>
</div>

<div id="toast" class="toast">Successfully saved!</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="logic.js"></script>
</body>
</html>
