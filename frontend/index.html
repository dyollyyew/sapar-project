<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Premium Booking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tkm-green: #00563b; --tkm-gold: #c5a059; --bg: #f5f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--tkm-green); color: white; padding: 25px; display: flex; flex-direction: column; z-index: 10; }
        .brand { font-size: 24px; font-weight: bold; margin-bottom: 40px; border-bottom: 2px solid var(--tkm-gold); padding-bottom: 10px; }
        .nav-link { padding: 15px; color: white; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: var(--tkm-gold); }

        /* Main Content */
        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
        .top-bar { background: white; padding: 15px 30px; display: flex; justify-content: flex-end; gap: 20px; border-bottom: 1px solid #ddd; align-items: center; }
        
        .hero { background: var(--tkm-green); color: white; padding: 80px 20px; text-align: center; }
        .hero h1 { margin: 0; font-size: 36px; letter-spacing: 2px; }

        /* Search Form */
        .search-container { max-width: 1000px; margin: -50px auto 30px; width: 95%; position: relative; }
        .search-box { background: white; padding: 30px; border-radius: 20px; display: flex; gap: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.12); border: 1px solid #eee; }
        .input-group { position: relative; flex: 1; }
        .input-group label { display: block; font-size: 10px; font-weight: bold; color: #999; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; outline: none; background: #fcfcfc; font-size: 14px; box-sizing: border-box; }
        
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; z-index: 100; display: none; max-height: 200px; overflow-y: auto; border-radius: 0 0 10px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .suggestions div { padding: 12px; cursor: pointer; border-bottom: 1px solid #f9f9f9; }
        .suggestions div:hover { background: #f0f0f0; color: var(--tkm-green); }

        .btn-search { background: #2ecc71; color: white; border: none; padding: 0 40px; border-radius: 10px; cursor: pointer; font-weight: bold; height: 45px; align-self: flex-end; transition: 0.3s; }
        .btn-search:hover { background: #27ae60; transform: translateY(-2px); }

        /* Tickets */
        .ticket { background: white; margin: 20px 0; border-radius: 15px; display: flex; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .ticket-info { flex: 1; padding: 30px; display: flex; justify-content: space-around; align-items: center; }
        .ticket-buy { width: 220px; padding: 30px; background: #fafafa; border-left: 1px dashed #ccc; text-align: center; }
        .price { font-size: 26px; font-weight: bold; color: var(--tkm-green); margin-bottom: 15px; }
        .btn-buy { background: #000; color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-buy:hover { background: #333; }

        /* Modals */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; backdrop-filter: blur(4px); }
        .modal-card { background:white; padding:35px; border-radius:20px; width:90%; max-width:450px; position:relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        /* My Orders List */
        .order-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid var(--tkm-green); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* E-Ticket Design */
        .e-ticket { background: #fff; border: 2px solid #333; border-radius: 10px; padding: 20px; margin-top: 15px; }
        .e-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">SAPAR.TM</div>
    <div class="nav-link active" onclick="showP('search-p')"><i class="fas fa-search"></i> <span class="lang" data-tk="Gözleg" data-ru="Поиск">Gözleg</span></div>
    <div class="nav-link" onclick="showP('orders-p')"><i class="fas fa-ticket-alt"></i> <span class="lang" data-tk="Sargytlarym" data-ru="Мои заказы">Sargytlarym</span></div>
    <div style="margin-top: auto;">
        <div class="nav-link" id="login-btn" onclick="userLogin()"><i class="fas fa-user-circle"></i> <span id="user-name-label">Giriş</span></div>
    </div>
</div>

<div class="main">
    <div class="top-bar">
        <div style="cursor:pointer; font-weight: bold; color: var(--tkm-green);">
            <span onclick="setLang('tk')">TKM</span> | <span onclick="setLang('ru')">РУС</span>
        </div>
    </div>

    <div id="search-p" class="page active-page">
        <div class="hero">
            <h1 id="slogan">Bagtly ýollar!</h1>
            <p style="opacity: 0.8;">Premium travel experience</p>
        </div>
        <div class="search-container">
            <div class="search-box">
                <div class="input-group">
                    <label>Nireden</label>
                    <input type="text" id="from" placeholder="Mysal: ASB" oninput="suggest(this, 's1')" autocomplete="off">
                    <div id="s1" class="suggestions"></div>
                </div>
                <div class="input-group">
                    <label>Nirä</label>
                    <input type="text" id="to" placeholder="Mysal: IST" oninput="suggest(this, 's2')" autocomplete="off">
                    <div id="s2" class="suggestions"></div>
                </div>
                <div class="input-group">
                    <label>Sene</label>
                    <input type="date" id="date">
                </div>
                <button class="btn-search" onclick="searchFlights()">GÖZLEG</button>
            </div>
            <div id="results" style="margin-top: 30px;"></div>
        </div>
    </div>

    <div id="orders-p" class="page" style="padding: 40px 10%; display:none;">
        <h2 style="color: var(--tkm-green);"><i class="fas fa-history"></i> Meniň sargytlarym</h2>
        <div id="orders-list"></div>
    </div>
</div>

<div id="booking-modal" class="modal-overlay">
    <div class="modal-card">
        <h3 style="margin:0 0 20px; color:var(--tkm-green); display:flex; align-items:center; gap:10px;">
            <i class="fas fa-id-card"></i> Yolagçy maglumaty
        </h3>
        <div style="background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 14px;">
            <b id="modal-flight-path"></b> <br>
            <span id="modal-flight-price" style="color: var(--tkm-green); font-weight: bold;"></span>
        </div>
        
        <div class="input-group" style="margin-bottom: 15px;">
            <label>Doly adyňyz (Anna Muratow mysalynda)</label>
            <input type="text" id="pass-name" placeholder="F.I.O.">
        </div>
        <div class="input-group" style="margin-bottom: 25px;">
            <label>Pasport seriýasy</label>
            <input type="text" id="pass-num" placeholder="I-AS 123456">
        </div>

        <div style="display:flex; gap:12px;">
            <button onclick="confirmBooking()" style="flex:2; background:var(--tkm-green); color:white; border:none; padding:15px; border-radius:10px; cursor:pointer; font-weight:bold;">BRONLAMAK</button>
            <button onclick="closeModal()" style="flex:1; background:#eee; border:none; padding:15px; border-radius:10px; cursor:pointer;">YZA</button>
        </div>
    </div>
</div>

<div id="ticket-modal" class="modal-overlay">
    <div class="modal-card" style="max-width: 500px;">
        <div style="text-align:center; color: var(--tkm-green); margin-bottom: 20px;">
            <i class="fas fa-check-circle" style="font-size: 40px;"></i>
            <h3>Sargyt tassyklanyldy!</h3>
        </div>
        <div class="e-ticket" id="e-ticket-content">
            </div>
        <button onclick="document.getElementById('ticket-modal').style.display='none'" style="width:100%; margin-top:20px; padding:12px; background:#000; color:#white; border:none; border-radius:10px; cursor:pointer; color:white;">YAPMAK</button>
    </div>
</div>

<script>
    const cities = ["Ashgabat (ASB)", "Mary (MYP)", "Dashoguz (TAZ)", "Turkmenabat (CRZ)", "Turkmenbashy (KRW)", "Istanbul (IST)", "Moscow (DME)", "Dubai (DXB)", "Kazan (KZN)", "Antalya (AYT)", "Abu Dhabi (AUH)"];
    let myOrders = [];
    let currentFlight = null;

    function suggest(inp, id) {
        const s = document.getElementById(id);
        const v = inp.value.toLowerCase();
        s.innerHTML = "";
        if(!v) { s.style.display="none"; return; }
        const found = cities.filter(c => c.toLowerCase().includes(v));
        if(found.length > 0) {
            s.style.display="block";
            found.forEach(c => {
                const d = document.createElement("div");
                d.innerText = c;
                d.onclick = () => { inp.value = c; s.style.display="none"; };
                s.appendChild(d);
            });
        }
    }

    async function searchFlights() {
        const fromFull = document.getElementById('from').value;
        const toFull = document.getElementById('to').value;
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('results');

        // Фикс IATA кода
        const from = fromFull.match(/\((.*?)\)/) ? fromFull.match(/\((.*?)\)/)[1] : fromFull;
        const to = toFull.match(/\((.*?)\)/) ? toFull.match(/\((.*?)\)/)[1] : toFull;

        if(!from || !to) return;
        resDiv.innerHTML = "<p style='text-align:center'>Gözlenilýär...</p>";

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resDiv.innerHTML = "";

            if(data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    const p = Math.round(t.price * 1.05);
                    resDiv.innerHTML += `
                        <div class="ticket">
                            <div class="ticket-info">
                                <div style="text-align:center"><b>${from}</b><br><small>Departure</small></div>
                                <div style="color:var(--tkm-gold); font-size: 20px;"><i class="fas fa-plane"></i></div>
                                <div style="text-align:center"><b>${to}</b><br><small>Arrival</small></div>
                            </div>
                            <div class="ticket-buy">
                                <div class="price">${p} RUB</div>
                                <button class="btn-buy" onclick="openBooking('${from}', '${to}', '${p}')">SATYN AL</button>
                            </div>
                        </div>`;
                });
            } else { resDiv.innerHTML = "<p style='text-align:center'>Bilet tapylmady.</p>"; }
        } catch(e) { resDiv.innerHTML = "Error!"; }
    }

    function openBooking(f, t, p) {
        currentFlight = { f, t, p, date: document.getElementById('date').value || 'Mälim däl' };
        document.getElementById('modal-flight-path').innerText = `${f} ➔ ${t}`;
        document.getElementById('modal-flight-price').innerText = `Bahasy: ${p} RUB`;
        document.getElementById('booking-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('booking-modal').style.display = 'none'; }

    function confirmBooking() {
        const name = document.getElementById('pass-name').value;
        const pass = document.getElementById('pass-num').value;
        
        if(!name || !pass) { alert("Ähli maglumatlary dolduryň!"); return; }

        // Добавляем в историю заказов
        const order = { ...currentFlight, passenger: name, passNum: pass, orderId: 'SAP' + Math.floor(Math.random()*99999) };
        myOrders.push(order);
        renderOrders();

        // Показываем Электронный билет
        document.getElementById('e-ticket-content').innerHTML = `
            <div class="e-header"><b>BOARDING PASS</b> <span>#${order.orderId}</span></div>
            <p><b>Passenger:</b> ${order.passenger}</p>
            <p><b>Route:</b> ${order.f} ➔ ${order.t}</p>
            <p><b>Date:</b> ${order.date}</p>
            <div style="border-top: 1px dashed #ccc; padding-top: 10px; margin-top: 10px; text-align:center;">
                <i class="fas fa-qrcode" style="font-size: 80px;"></i>
            </div>
        `;
        
        closeModal();
        document.getElementById('ticket-modal').style.display = 'flex';
        // Очистка
        document.getElementById('pass-name').value = "";
        document.getElementById('pass-num').value = "";
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        if(myOrders.length === 0) {
            list.innerHTML = "Sargyt tapylmady.";
            return;
        }
        list.innerHTML = myOrders.map(o => `
            <div class="order-card">
                <div>
                    <b>${o.f} ➔ ${o.t}</b><br>
                    <small>${o.passenger} | ${o.date}</small>
                </div>
                <div style="text-align:right">
                    <b style="color:var(--tkm-green)">${o.p} RUB</b><br>
                    <small style="color:blue">Tassyklanyldy</small>
                </div>
            </div>
        `).join('');
    }

    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function setLang(l) {
        document.getElementById('slogan').innerText = (l === 'tk') ? "Bagtly ýollar!" : "Счастливого пути!";
    }

    function userLogin() {
        const u = prompt("Giriş adyňyz:");
        if(u) document.getElementById('user-name-label').innerText = u;
    }
</script>
</body>
</html>
