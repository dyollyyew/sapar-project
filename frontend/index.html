<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Bilet Gözlegi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root {
        --primary: #2ecc71;
        --dark-red: #800000;
        --gold: #d4af37;
        --bg: #f5f7fa;
    }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        margin: 0;
        color: #333;
    }

    header {
        background: #ffffff;
        padding: 15px 10%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .logo { font-size: 26px; font-weight: 800; color: #1a1a1a; text-decoration: none; }
    .logo span { color: var(--primary); }

    /* Исправленный бордовый фон */
    /* ОБНОВЛЕННЫЙ БЛОК `.hero` ДЛЯ РЕАЛИСТИЧНОГО КОВРА */
.hero {
    width: 100%;
    height: 350px; /* Сделаем чуть выше, чтобы ковер было лучше видно */
    /* Используем градиент как подложку и накладываем твою картинку ковра поверх */
    background: 
        linear-gradient(rgba(100, 0, 0, 0.4), rgba(60, 0, 0, 0.6)), /* Бордовое затемнение сверху для читаемости */
        url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Turkmen_Rug_Ahl_Pattern.jpg'); /* Ссылка на этот паттерн (из твоего скрина) */
    
    background-size: cover; /* Ковер покроет всю площадь, не растягиваясь */
    background-position: center; /* Центрируем узор */
    border-bottom: 5px solid var(--gold); /* Золотая полоса снизу */
    position: relative;
    box-shadow: inset 0 -30px 60px rgba(0,0,0,0.5); /* Внутренняя тень для глубины */
}

    .main-content {
        max-width: 1000px;
        margin: -70px auto 50px;
        padding: 0 20px;
    }

    /* Стильная белая панель */
    .search-panel {
        background: #ffffff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .input-group { flex: 1; min-width: 200px; }
    .input-group label { 
        display: block; 
        font-size: 11px; 
        font-weight: 700; 
        color: #888; 
        margin-bottom: 8px; 
        text-transform: uppercase; 
    }

    .input-group input { 
        width: 100%; 
        padding: 12px 15px; 
        border: 1px solid #e0e0e0; 
        border-radius: 10px; 
        font-size: 16px; 
        outline: none;
        box-sizing: border-box; /* Чтобы поля не вылезали за края */
    }

    .btn-search {
        background: var(--primary); 
        color: white; 
        border: none; 
        padding: 0 35px;
        border-radius: 10px; 
        font-weight: 700; 
        height: 45px; 
        cursor: pointer; 
        transition: 0.3s;
    }

    .btn-search:hover { background: #27ae60; transform: translateY(-2px); }

    /* Карточка билета */
    .ticket {
        background: white; 
        border-radius: 15px; 
        margin-top: 20px; 
        display: flex;
        border: 1px solid #eee; 
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .flight-info { flex: 1; padding: 25px; display: flex; align-items: center; justify-content: space-between; }
    .price-box { 
        width: 220px; 
        background: #fafafa; 
        border-left: 1px dashed #ddd; 
        padding: 25px; 
        text-align: center;
    }

    .time { font-size: 24px; font-weight: 800; }
    .city { font-size: 13px; color: #999; font-weight: 600; }
    
    .plane-path { flex: 1; height: 1px; background: #ddd; margin: 0 20px; position: relative; }
    .plane-path i { position: absolute; top: -10px; left: 50%; color: var(--primary); background: white; padding: 0 5px; }

    .price { font-size: 22px; font-weight: 900; margin-bottom: 10px; color: #222; }
    .buy-btn { 
        background: #ff5e5e; 
        color: white; 
        text-decoration: none; 
        padding: 10px; 
        border-radius: 8px; 
        font-weight: 700; 
        display: block;
    }
</style>
</head>
<body>

<header>
    <a href="/" class="logo">SAPAR<span>.TM</span></a>
</header>

<div class="carpet-section"></div>

<div class="main-container">
    <div class="search-panel">
        <div class="input-box"><label>Nireden</label><input type="text" id="origin" value="MOW"></div>
        <div class="input-box"><label>Nirä</label><input type="text" id="destination" value="ASB"></div>
        <div class="input-box"><label>Sene</label><input type="date" id="date"></div>
        <button class="btn-go" onclick="searchFlights()">GÖZLEG</button>
    </div>
    <div id="results"></div>
</div>

<script>
    /* --- ЛОГИКА (НЕ ИЗМЕНЕНА) --- */
    async function searchFlights() {
        const from = document.getElementById('origin').value;
        const to = document.getElementById('destination').value;
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('results');

        if(!from || !to || !date) return alert("Dolduryň!");
        resDiv.innerHTML = '<div class="status-text"><i class="fas fa-spinner fa-spin"></i> Biletler gözlenilýär...</div>';

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resDiv.innerHTML = "";
            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    const d = new Date(t.departure_at);
                    resDiv.innerHTML += `
                        <div class="ticket-card">
                            <div class="flight-info">
                                <div><div class="time">${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</div><div class="city-code">${t.origin}</div></div>
                                <div class="plane-divider"><i class="fas fa-plane"></i></div>
                                <div><div class="time">--:--</div><div class="city-code">${t.destination}</div></div>
                            </div>
                            <div class="price-zone">
                                <div class="price">${t.price.toLocaleString()} RUB</div>
                                <a href="https://www.aviasales.ru${t.link}" class="buy-btn" target="_blank">SATYN AL</a>
                            </div>
                        </div>`;
                });
            } else { resDiv.innerHTML = '<div class="status-text">Bagyşlaň, bilet tapylmady.</div>'; }
        } catch (e) { resDiv.innerHTML = '<div class="status-text" style="color:red;">Näsazlyk ýüze çykdy.</div>'; }
    }
</script>
</body>
</html>
