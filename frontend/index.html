<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SAPAR.TM</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .app { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 350px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #0052cc; color: white; border: none; font-weight: bold; cursor: pointer; }
        .ticket { border: 1px solid #eee; padding: 10px; margin-top: 10px; border-radius: 8px; border-left: 4px solid #0052cc; }
    </style>
</head>
<body>
    <div class="app">
        <h1 style="text-align:center; color:#0052cc;">SAPAR.TM</h1>
        <input type="text" id="from" placeholder="Откуда (ASB)" value="ASB">
        <input type="text" id="to" placeholder="Куда (KZN)" value="KZN">
        <input type="date" id="date">
        <button onclick="search()">НАЙТИ БИЛЕТЫ</button>
        <div id="res"></div>
    </div>

    <script>
        async function search() {
            const resDiv = document.getElementById('res');
            resDiv.innerHTML = "Поиск...";
            try {
                const response = await fetch('/api/search-live', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        origin: document.getElementById('from').value.toUpperCase(),
                        destination: document.getElementById('to').value.toUpperCase(),
                        date: document.getElementById('date').value
                    })
                });
                const data = await response.json();
                resDiv.innerHTML = "";
                if (data.tickets && data.tickets.length > 0) {
                    data.tickets.forEach(t => {
                        resDiv.innerHTML += `<div class="ticket"><b>${t.proposals[0].value} RUB</b><br>Прямой рейс</div>`;
                    });
                } else {
                    resDiv.innerHTML = "Билетов не найдено.";
                }
            } catch (e) {
                resDiv.innerHTML = "<span style='color:red'>Ошибка связи с сервером.</span>";
            }
        }
    </script>
</body>
</html>
