<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SAPAR.TM — Официальный сервис</title>
    <style>
        :root { --green: #00873d; --red: #ff5e62; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; }
        .header { background: var(--green); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .search-box { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .lang-btn { background: none; border: 1px solid white; color: white; cursor: pointer; margin-left: 5px; border-radius: 4px; }
        .ticket { background: white; margin: 10px auto; padding: 20px; border-radius: 10px; border-left: 10px solid var(--green); display: flex; justify-content: space-between; max-width: 1000px; }
        .btn-buy { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 24px; font-weight: bold;">SAPAR.TM</div>
    <div>
        <button class="lang-btn" onclick="setLang('tk')">TK</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
</div>

<div class="search-box">
    <h2 id="txt-title">Поиск авиабилетов</h2>
    <div class="grid">
        <div><label id="lbl-from">Откуда</label><select id="from"></select></div>
        <div><label id="lbl-to">Куда</label><select id="to"></select></div>
        <div><label id="lbl-date">Туда</label><input type="date" id="dateStart"></div>
        <div><label id="lbl-back">Обратно</label><input type="date" id="dateEnd"></div>
        <div><label id="lbl-who">Кто</label><select><option>1 Ýolagçy</option></select></div>
    </div>
    <button onclick="search()" class="btn-buy" style="width:100%; margin-top:20px; font-size:18px;" id="btn-find">НАЙТИ</button>
</div>

<div id="results"></div>

<div id="modal" class="modal">
    <div style="background:white; padding:30px; border-radius:15px; width:400px;">
        <h3 id="txt-book">Данные пассажира (LATIN)</h3>
        <input type="text" id="pName" placeholder="NAME (e.g. AMAN)" oninput="this.value = this.value.replace(/[^A-Za-z]/g, '')">
        <input type="text" id="pSurname" placeholder="SURNAME (e.g. AMANOW)" oninput="this.value = this.value.replace(/[^A-Za-z]/g, '')">
        <input type="text" id="pPass" placeholder="PASSPORT (e.g. I-AS123456)">
        <p id="txt-fee" style="font-size:12px; color:gray;">* Включая комиссию 5%</p>
        <button class="btn-buy" style="width:100%" onclick="confirmBooking()" id="btn-confirm">ОПЛАТИТЬ</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:gray; margin-top:10px;">Отмена</button>
    </div>
</div>

<script>
    const API = 'https://sapar-project-production.up.railway.app';
    let currentTicket = null;

    const i18n = {
        ru: { title: "Поиск авиабилетов", from: "Откуда", to: "Куда", find: "НАЙТИ", buy: "КУПИТЬ", fee: "* Комиссия 5% включена" },
        tk: { title: "Awia bilet gözlegi", from: "Nireden", to: "Nirä", find: "TAP", buy: "SATYN AL", fee: "* 5% komissiýa goşuldy" },
        en: { title: "Search Flights", from: "From", to: "To", find: "SEARCH", buy: "BUY", fee: "* 5% fee included" }
    };

    function setLang(lang) {
        document.getElementById('txt-title').innerText = i18n[lang].title;
        document.getElementById('lbl-from').innerText = i18n[lang].from;
        document.getElementById('lbl-to').innerText = i18n[lang].to;
        document.getElementById('btn-find').innerText = i18n[lang].find;
        document.getElementById('txt-fee').innerText = i18n[lang].fee;
    }

    window.onload = async () => {
        document.getElementById('dateStart').value = "2026-04-05";
        const res = await fetch(`${API}/api/cities`);
        const cities = await res.json();
        cities.forEach(c => {
            document.getElementById('from').add(new Option(c, c));
            document.getElementById('to').add(new Option(c, c));
        });
        setLang('ru');
    };

    async function search() {
        const f = document.getElementById('from').value, t = document.getElementById('to').value, d = document.getElementById('dateStart').value;
        const res = await fetch(`${API}/api/search?from=${f}&to=${t}&date=${d}`);
        const data = await res.json();
        const div = document.getElementById('results');
        div.innerHTML = '';
        data.forEach(tick => {
            const feePrice = (tick.price * 1.05).toFixed(0);
            div.innerHTML += `<div class="ticket">
                <div><b style="font-size:20px">${tick.time}</b><br>${tick.airline}</div>
                <div style="text-align:right"><b style="color:var(--green); font-size:22px">${feePrice} TMT</b><br>
                <button class="btn-buy" onclick="openModal(${JSON.stringify(tick).replace(/"/g, '&quot;')})">ВЫБРАТЬ</button></div>
            </div>`;
        });
    }

    function openModal(tick) {
        currentTicket = tick;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function confirmBooking() {
        const name = document.getElementById('pName').value;
        const surname = document.getElementById('pSurname').value;
        const pass = document.getElementById('pPass').value;

        if(!name || !surname || !pass) return alert("Fill all fields in LATIN!");

        const res = await fetch(`${API}/api/book`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ trip_id: currentTicket.id, name, surname, passport: pass, price: currentTicket.price })
        });
        const result = await res.json();
        if(result.success) {
            alert(`SUCCESS! Ticket for ${name} confirmed. Total: ${result.total} TMT`);
            closeModal();
        }
    }
</script>
</body>
</html>
