<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Bilet Gözlegi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    /* ЦВЕТОВАЯ ПАЛИТРА */
    :root {
        --primary: #2ecc71; /* Сочный зеленый */
        --dark-red: #7b0000; /* Глубокий бордовый */
        --gold: #d4af37; /* Благородное золото */
        --bg: #f8fafb;
        --white: #ffffff;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg);
        margin: 0;
        color: #2c3e50;
    }

    header {
        background: var(--white);
        padding: 20px 10%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #edf2f7;
    }

    .logo { 
        font-size: 28px; 
        font-weight: 900; 
        color: #1a1a1a; 
        text-decoration: none; 
        letter-spacing: -1px;
    }
    .logo span { color: var(--primary); }

    /* ОБНОВЛЕННЫЙ БЛОК С КОВРОМ */
    .hero {
        width: 100%;
        height: 300px;
        background: linear-gradient(135deg, #8b0000 0%, #5d0000 100%);
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Добавляем паттерн орнамента поверх фона */
    .hero::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: url('https://www.transparenttextures.com/patterns/p6.png'); /* Текстура ткани */
        opacity: 0.3;
    }

    /* Золотая линия снизу */
    .hero::after {
        content: "";
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .main-content {
        max-width: 1100px;
        margin: -100px auto 50px;
        padding: 0 20px;
        position: relative;
        z-index: 10;
    }

    /* ПАНЕЛЬ ПОИСКА */
    .search-panel {
        background: var(--white);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .input-group { flex: 1; min-width: 180px; }
    .input-group label { 
        display: block; 
        font-size: 12px; 
        font-weight: 800; 
        color: #a0aec0; 
        margin-bottom: 10px; 
        text-transform: uppercase; 
        letter-spacing: 1px;
    }
    .input-group input { 
        width: 100%; 
        padding: 15px 20px; 
        border: 2px solid #edf2f7; 
        border-radius: 16px; 
        font-size: 16px; 
        font-weight: 600;
        transition: all 0.3s ease;
        background: #fdfdfd;
    }
    .input-group input:focus { 
        border-color: var(--primary); 
        background: #fff;
        box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        outline: none;
    }

    .btn-search {
        background: var(--primary); 
        color: var(--white); 
        border: none; 
        padding: 0 50px;
        border-radius: 16px; 
        font-weight: 800; 
        font-size: 16px;
        height: 54px; 
        cursor: pointer; 
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .btn-search:hover { 
        transform: translateY(-3px); 
        box-shadow: 0 10px 25px rgba(46, 204, 113, 0.4);
        filter: brightness(1.1);
    }

    /* КАРТОЧКА БИЛЕТА */
    .ticket {
        background: var(--white); 
        border-radius: 20px; 
        margin-top: 25px; 
        display: flex;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        border: 1px solid #f0f0f0;
        overflow: hidden;
        animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .flight-info { flex: 1; padding: 35px; display: flex; align-items: center; justify-content: space-between; }
    .price-box { 
        width: 260px; 
        background: #fcfdfe; 
        border-left: 2px dashed #eee; 
        padding: 35px; 
        text-align: center; 
        display: flex; 
        flex-direction: column; 
        justify-content: center;
    }

    .time { font-size: 32px; font-weight: 800; color: #1a202c; margin-bottom: 5px; }
    .city { font-size: 15px; color: #718096; font-weight: 700; text-transform: uppercase; }
    
    .plane-path { flex: 1; height: 2px; background: #e2e8f0; margin: 0 30px; position: relative; }
    .plane-path i { 
        position: absolute; top: -12px; left: 50%; 
        transform: translateX(-50%); 
        color: var(--primary); 
        background: var(--white); 
        padding: 0 15px;
        font-size: 20px;
    }

    .price { font-size: 28px; font-weight: 900; color: #1a1a1a; margin-bottom: 15px; }
    .buy-btn { 
        background: #ff4757; 
        color: var(--white); 
        text-decoration: none; 
        padding: 15px; 
        border-radius: 12px; 
        font-weight: 800; 
        display: block; 
        font-size: 15px;
        transition: 0.3s;
    }
    .buy-btn:hover { background: #ff2a3b; transform: scale(1.02); }

    .status { text-align: center; padding: 60px; color: #718096; font-size: 18px; font-weight: 600; }
</style>
</head>
<body>

<header>
    <a href="/" class="logo">SAPAR<span>.TM</span></a>
</header>

<div class="carpet-section"></div>

<div class="main-container">
    <div class="search-panel">
        <div class="input-box"><label>Nireden</label><input type="text" id="origin" value="MOW"></div>
        <div class="input-box"><label>Nirä</label><input type="text" id="destination" value="ASB"></div>
        <div class="input-box"><label>Sene</label><input type="date" id="date"></div>
        <button class="btn-go" onclick="searchFlights()">GÖZLEG</button>
    </div>
    <div id="results"></div>
</div>

<script>
    /* --- ЛОГИКА (НЕ ИЗМЕНЕНА) --- */
    async function searchFlights() {
        const from = document.getElementById('origin').value;
        const to = document.getElementById('destination').value;
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('results');

        if(!from || !to || !date) return alert("Dolduryň!");
        resDiv.innerHTML = '<div class="status-text"><i class="fas fa-spinner fa-spin"></i> Biletler gözlenilýär...</div>';

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resDiv.innerHTML = "";
            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    const d = new Date(t.departure_at);
                    resDiv.innerHTML += `
                        <div class="ticket-card">
                            <div class="flight-info">
                                <div><div class="time">${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</div><div class="city-code">${t.origin}</div></div>
                                <div class="plane-divider"><i class="fas fa-plane"></i></div>
                                <div><div class="time">--:--</div><div class="city-code">${t.destination}</div></div>
                            </div>
                            <div class="price-zone">
                                <div class="price">${t.price.toLocaleString()} RUB</div>
                                <a href="https://www.aviasales.ru${t.link}" class="buy-btn" target="_blank">SATYN AL</a>
                            </div>
                        </div>`;
                });
            } else { resDiv.innerHTML = '<div class="status-text">Bagyşlaň, bilet tapylmady.</div>'; }
        } catch (e) { resDiv.innerHTML = '<div class="status-text" style="color:red;">Näsazlyk ýüze çykdy.</div>'; }
    }
</script>
</body>
</html>
