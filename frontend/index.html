<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
    <meta charset="UTF-8">
    <title>SAPAR.TM — Поиск билетов (Бизнес)</title>
    <style>
        :root { --main: #0052cc; --gold: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h1 { color: var(--main); text-align: center; letter-spacing: 3px; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); }
        button { padding: 18px; background: var(--main); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .ticket { border: 1px solid #eee; padding: 20px; border-radius: 15px; margin-top: 20px; border-left: 5px solid var(--main); }
        .price { font-size: 24px; font-weight: bold; color: #27ae60; }
        .buy-link { display: block; background: #ff9800; color: white; text-decoration: none; text-align: center; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>SAPAR.TM</h1>
    <div class="input-group">
        <input type="text" id="from" list="cities" placeholder="Откуда (ASB)">
        <input type="text" id="to" list="cities" placeholder="Куда (KZN)">
        <datalist id="cities">
            <option value="Ашхабад (ASB)">
            <option value="Казань (KZN)">
            <option value="Москва (MOW)">
        </datalist>
        <input type="date" id="date">
        <button id="searchBtn">ПОИСК РЕЙСОВ</button>
    </div>
    <div id="results"></div>
</div>

<script>
    const MARKER = '716446'; // Ваш маркер

    function getCode(str) {
        const m = str.match(/\(([^)]+)\)/);
        return m ? m[1] : str.toUpperCase().trim();
    }

    document.getElementById('searchBtn').onclick = async () => {
        const from = getCode(document.getElementById('from').value);
        const to = getCode(document.getElementById('to').value);
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('results');

        if(!from || !to || !date) return alert("Заполните поля");

        resDiv.innerHTML = '<p style="text-align:center">Ищем реальные билеты...</p>';

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resDiv.innerHTML = '';

            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    const price = t.proposals[0].value;
                    const buyUrl = `https://www.aviasales.ru/search/${from}${date.replace(/-/g,'')}${to}1?marker=${MARKER}`;
                    
                    resDiv.innerHTML += `
                        <div class="ticket">
                            <div class="price">${price} RUB</div>
                            <div>${from} ➔ ${to}</div>
                            <a href="${buyUrl}" target="_blank" class="buy-link">ЗАБРОНИРОВАТЬ</a>
                        </div>`;
                });
            } else {
                resDiv.innerHTML = '<p>Билеты не найдены. Попробуйте другую дату.</p>';
            }
        } catch (e) {
            resDiv.innerHTML = '<p style="color:red">Ошибка связи с сервером.</p>';
        }
    };
</script>
</body>
</html>
