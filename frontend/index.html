<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPARTM - Бронирование</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { --green: #008755; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        header { background: #fff; padding: 10px 8%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 24px; font-weight: bold; color: var(--green); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .lang-switcher span { cursor: pointer; padding: 5px 10px; border-radius: 4px; font-weight: bold; color: #888; }
        .lang-switcher span.active { color: #fff; background: var(--green); }
        .user-btn { cursor: pointer; background: #eee; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .hero { background: var(--green); height: 150px; display: flex; align-items: center; justify-content: center; color: #fff; }
        .search-container { max-width: 1000px; margin: -40px auto 20px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: grid; grid-template-columns: 1fr auto 1fr 1fr auto; gap: 15px; align-items: end; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 12px; font-weight: bold; color: #999; text-transform: uppercase; }
        .field input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; }
        .btn-main { background: var(--green); color: #fff; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 45px; }
        .popular { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .dest-card { background: #fff; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .dest-card:hover { transform: translateY(-5px); }
        .dest-card img { width: 100%; height: 120px; object-fit: cover; }
        .dest-card p { padding: 10px; font-weight: bold; margin: 0; }
        /* Модалка ЛК */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 320px; text-align: center; }
        /* Билеты */
        .ticket { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; display: flex; justify-content: space-between; position: relative; }
        .badge { position: absolute; top: 0; left: 0; padding: 3px 10px; font-size: 11px; color: #fff; border-radius: 0 0 10px 0; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo"><i class="fas fa-paper-plane"></i> SAPARTM</a>
    <div class="nav-right">
        <div class="lang-switcher">
            <span id="lang-tk" class="active" onclick="setLang('tk')">TKM</span>
            <span id="lang-ru" onclick="setLang('ru')">РУС</span>
        </div>
        <div class="user-btn" onclick="toggleModal()">
            <i class="fas fa-user-circle"></i> <span id="user-display">Profil</span>
        </div>
    </div>
</header>

<div class="hero"><h1 id="welcome-text">Hoş geldiňiz!</h1></div>

<div class="search-container">
    <div class="field">
        <label id="lbl-from">Nireden</label>
        <input type="text" id="from" placeholder="MOW" value="MOW">
    </div>
    <div style="padding-bottom: 12px; cursor: pointer;" onclick="swapCities()">⇄</div>
    <div class="field">
        <label id="lbl-to">Nirä</label>
        <input type="text" id="to" placeholder="ASB" value="ASB">
    </div>
    <div class="field">
        <label id="lbl-date">Sene</label>
        <input type="text" id="date">
    </div>
    <button class="btn-main" onclick="searchFlights()" id="btn-search">GÖZLEG</button>
</div>

<div id="results" style="max-width: 800px; margin: auto;"></div>

<div class="popular" id="popular-section">
    <h2 id="popular-title" style="text-align: center; margin-bottom: 30px;">Meşhur ugurlar</h2>
    <div class="grid">
        <div class="dest-card" onclick="quickSearch('ASB','IST')"><img src="img/ist.jpg"><p>Stambul</p></div>
        <div class="dest-card" onclick="quickSearch('ASB','MOW')"><img src="img/mow.jpg"><p>Moskwa</p></div>
        <div class="dest-card" onclick="quickSearch('ASB','DXB')"><img src="img/dxb.jpg"><p>Dubaý</p></div>
        <div class="dest-card" onclick="quickSearch('ASB','KZN')"><img src="img/kzn.jpg"><p>Kazan</p></div>
    </div>
</div>

<div id="user-modal" class="modal">
    <div class="modal-content">
        <h3 id="lk-title">Profil</h3>
        <input type="text" id="u-name" placeholder="Ady" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
        <button class="btn-main" onclick="saveProfile()" style="width:100%">Ýazdyr</button>
        <p onclick="toggleModal()" style="color:red; cursor:pointer; margin-top:15px;">Yap</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="logic.js"></script>
</body>
</html>
