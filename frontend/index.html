<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Bilet Gözlegi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- ОБНОВЛЕННЫЙ ДИЗАЙН (CSS) --- */
        :root {
            --primary: #27ae60;
            --carpet-red: #8b0505;
            --gold: #d4af37;
            --bg: #f1f5f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: #1e293b;
        }

        header {
            background: var(--white);
            padding: 15px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            text-decoration: none;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span { color: var(--primary); }

        /* Национальная секция с ковром */
        .hero-banner {
            width: 100%;
            height: 220px;
            background-color: var(--carpet-red);
            /* Используем паттерн, напоминающий орнамент */
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
            border-bottom: 5px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            margin: -70px auto 60px;
            padding: 0 20px;
        }

        /* Панель поиска */
        .search-box {
            background: var(--white);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .field { flex: 1; min-width: 180px; }
        .field label { 
            display: block; 
            font-size: 11px; 
            font-weight: 800; 
            color: #64748b; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }
        .field input:focus { border-color: var(--primary); background: #f8fafc; }

        .btn-go {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            height: 52px;
            transition: 0.3s;
        }
        .btn-go:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(39, 174, 96, 0.4); }

        /* Результаты и карточки */
        #results { margin-top: 40px; }

        .ticket {
            background: var(--white);
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: 0.3s ease;
        }
        .ticket:hover { transform: scale(1.01); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .route-info { flex: 1; padding: 30px; display: flex; align-items: center; justify-content: space-between; }
        .price-section { 
            width: 220px; 
            background: #f8fafc; 
            padding: 30px; 
            border-left: 2px dashed #e2e8f0;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .time { font-size: 28px; font-weight: 800; color: #0f172a; }
        .city-code { font-size: 14px; font-weight: 700; color: #64748b; margin-top: 4px; }
        
        .divider { flex: 1; height: 2px; background: #cbd5e0; margin: 0 30px; position: relative; }
        .divider i { 
            position: absolute; 
            left: 50%; top: 50%; 
            transform: translate(-50%, -50%); 
            background: var(--white); 
            padding: 0 10px; 
            color: var(--primary);
            font-size: 20px;
        }

        .price-val { font-size: 26px; font-weight: 900; color: #0f172a; margin-bottom: 12px; }
        .buy-btn {
            background: #eb5757;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            transition: 0.3s;
        }
        .buy-btn:hover { background: #dc2626; }

        .loader { text-align: center; padding: 60px; color: #64748b; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">SAPAR<span>.TM</span></a>
</header>

<div class="hero-banner">
    </div>

<div class="container">
    <div class="search-box">
        <div class="field">
            <label>Nireden</label>
            <input type="text" id="from" value="MOW">
        </div>
        <div class="field">
            <label>Nirä</label>
            <input type="text" id="to" value="ASB">
        </div>
        <div class="field">
            <label>Uçuş Senesi</label>
            <input type="date" id="date">
        </div>
        <button class="btn-go" onclick="searchFlights()">GÖZLEG</button>
    </div>

    <div id="results">
        </div>
</div>

<script>
    async function searchFlights() {
        const from = document.getElementById('from').value;
        const to = document.getElementById('to').value;
        const date = document.getElementById('date').value;
        const resArea = document.getElementById('results');

        if(!from || !to || !date) {
            alert("Dolduryň!");
            return;
        }

        resArea.innerHTML = '<div class="loader"><i class="fas fa-circle-notch fa-spin"></i> Gözlenilýär...</div>';

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resArea.innerHTML = "";

            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    const d = new Date(t.departure_at);
                    resArea.innerHTML += `
                        <div class="ticket">
                            <div class="route-info">
                                <div style="text-align:center">
                                    <div class="time">${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</div>
                                    <div class="city-code">${t.origin}</div>
                                </div>
                                <div class="divider"><i class="fas fa-plane"></i></div>
                                <div style="text-align:center">
                                    <div class="time">--:--</div>
                                    <div class="city-code">${t.destination}</div>
                                </div>
                            </div>
                            <div class="price-section">
                                <div class="price-val">${t.price.toLocaleString()} RUB</div>
                                <a href="https://www.aviasales.ru${t.link}" class="buy-btn" target="_blank">SATYN AL</a>
                            </div>
                        </div>`;
                });
            } else {
                resArea.innerHTML = '<div class="loader">Bilet tapylmady.</div>';
            }
        } catch (e) {
            resArea.innerHTML = '<div class="loader" style="color:red;">Näsazlyk ýüze çykdy.</div>';
        }
    }
</script>

</body>
</html>
