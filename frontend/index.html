<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM — Fly with Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #00a86b;
            --bg: #f4f7f6;
            --glass: rgba(255, 255, 255, 0.8);
            --text: #1d1d1f;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); 
            margin: 0; 
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Навигация 2026: Чистота и иконки */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--glass); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 1000; box-sizing: border-box;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .brand i { color: var(--accent); font-size: 26px; } /* Зеленый самолетик без рамок */
        .brand b { font-size: 22px; color: var(--text); letter-spacing: -0.5px; }

        .nav-tools { display: flex; align-items: center; gap: 20px; }
        .lang-link { color: #888; text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.3s; }
        .lang-link:hover, .lang-link.active { color: var(--accent); }
        .user-btn { font-size: 22px; color: var(--text); cursor: pointer; }

        /* Главный блок: Мягкий градиент */
        .hero {
            height: 400px;
            background: linear-gradient(135deg, #004d40 0%, #00a86b 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; padding-top: 70px;
        }
        .hero h1 { font-size: 48px; font-weight: 800; margin: 0; }
        .hero p { opacity: 0.8; font-size: 18px; margin-top: 10px; font-weight: 300; }

        /* Контейнер поиска: Парящий эффект */
        .search-wrap { max-width: 1100px; margin: -50px auto 50px; padding: 0 20px; }
        .search-card {
            background: white; padding: 30px; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;
        }

        .input-box { flex: 1; min-width: 200px; }
        .input-box label { display: block; font-size: 12px; font-weight: 700; color: #a1a1a6; margin-bottom: 8px; text-transform: uppercase; }
        .input-box input {
            width: 100%; padding: 14px; border: 1px solid #e5e5e7; border-radius: 12px;
            font-size: 16px; transition: 0.3s; outline: none; background: #fafafa;
        }
        .input-box input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(0,168,107,0.1); }

        .search-btn {
            background: var(--accent); color: white; border: none; padding: 0 40px;
            border-radius: 12px; height: 48px; font-weight: 700; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(0,168,107,0.2);
        }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(0,168,107,0.3); }

        /* Результаты: Карточки в стиле Apple */
        #results-list { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .ticket {
            background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; border: 1px solid rgba(0,0,0,0.03);
        }
        .ticket:hover { transform: scale(1.01); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .route { font-size: 22px; font-weight: 700; color: var(--text); }
        .price-tag { text-align: right; }
        .price-val { font-size: 24px; font-weight: 800; color: var(--accent); }
        .buy-now { 
            display: inline-block; background: #000; color: #fff; text-decoration: none;
            padding: 10px 25px; border-radius: 10px; font-size: 14px; font-weight: 600; margin-top: 10px;
        }

        /* Информационные иконки */
        .info-grid { max-width: 1100px; margin: 60px auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; padding: 0 20px; }
        .info-item { text-align: center; }
        .info-item i { font-size: 30px; color: var(--accent); margin-bottom: 15px; }
        .info-item h3 { font-size: 16px; margin-bottom: 5px; }
        .info-item p { font-size: 14px; color: #888; margin: 0; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="brand">
        <i class="fab fa-telegram-plane"></i>
        <b>SAPAR<span>.TM</span></b>
    </a>
    <div class="nav-tools">
        <a href="#" class="lang-link active">TKM</a>
        <a href="#" class="lang-link">RU</a>
        <i class="fas fa-user-circle user-btn"></i>
    </div>
</nav>

<div class="hero">
    <h1>TKM AIRLINES</h1>
    <p>Premium travel experience</p>
</div>

<div class="search-wrap">
    <div class="search-card">
        <div class="input-box"><label>Nireden</label><input type="text" id="from" placeholder="MOW"></div>
        <div class="input-box"><label>Nirä</label><input type="text" id="to" placeholder="ASB"></div>
        <div class="input-box"><label>Sene</label><input type="date" id="date"></div>
        <button class="search-btn" onclick="runSearch()">GÖZLEG</button>
    </div>
    <div id="results-list"></div>
</div>

<div class="info-grid">
    <div class="info-item"><i class="fas fa-shield-alt"></i><h3>Ynamly</h3><p>Secure payments</p></div>
    <div class="info-item"><i class="fas fa-bolt"></i><h3>Çalt</h3><p>Instant booking</p></div>
    <div class="info-item"><i class="fas fa-headset"></i><h3>24/7 Goldaw</h3><p>Customer support</p></div>
</div>

<script>
    // Логика остается прежней, меняется только вид вывода
    async function runSearch() {
        const from = document.getElementById('from').value;
        const to = document.getElementById('to').value;
        const date = document.getElementById('date').value;
        const resBox = document.getElementById('results-list');

        if(!from || !to || !date) return;
        resBox.innerHTML = '<p style="text-align:center; padding:50px; opacity:0.5;">Gözlenilýär...</p>';

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resBox.innerHTML = "";
            if(data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    resBox.innerHTML += `
                        <div class="ticket">
                            <div class="route">${t.origin} → ${t.destination}</div>
                            <div class="price-tag">
                                <div class="price-val">${t.price.toLocaleString()} RUB</div>
                                <a href="https://www.aviasales.ru${t.link}" class="buy-now" target="_blank">SATYN AL</a>
                            </div>
                        </div>`;
                });
            } else { resBox.innerHTML = "<p style='text-align:center'>Bilet tapylmady.</p>"; }
        } catch (e) { resBox.innerHTML = "<p style='text-align:center; color:red;'>Näsazlyk ýüze çykdy.</p>"; }
    }
</script>
</body>
</html>
