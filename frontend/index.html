<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPARTM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { --green: #008755; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        
        /* Анимация логотипа */
        @keyframes planeFly {
            0% { transform: translate(0,0); opacity: 1; }
            40% { transform: translate(30px, -30px); opacity: 0; }
            41% { transform: translate(-30px, 30px); opacity: 0; }
            100% { transform: translate(0,0); opacity: 1; }
        }

        header { background: #fff; padding: 12px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        
        /* Ссылка-логотип */
        .logo { 
            font-size: 24px; font-weight: 800; color: var(--green); 
            text-decoration: none; display: flex; align-items: center; gap: 10px; 
            cursor: pointer;
        }
        .logo:hover i { animation: planeFly 0.6s ease-in-out; display: inline-block; }
        
        .lang-switcher span { cursor: pointer; font-weight: bold; color: #999; padding: 5px; }
        .lang-switcher span.active { color: var(--green); border-bottom: 2px solid var(--green); }
        .btn-login { padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: 600; }

        .hero { background: var(--green); height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }

        .search-container { max-width: 1100px; margin: -50px auto 40px; padding: 0 20px; }
        .search-card { 
            background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: grid; grid-template-columns: 1fr 40px 1fr 1fr auto; align-items: end; gap: 15px;
        }
        .field { display: flex; flex-direction: column; gap: 5px; position: relative; }
        .field label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; }
        .field input { padding: 12px; border: 1px solid #eee; border-radius: 8px; font-size: 15px; outline: none; }
        
        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0; background: #fff;
            border: 1px solid #eee; border-radius: 0 0 8px 8px; z-index: 1000; display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .suggest-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f9f9f9; }
        .suggest-item:hover { background: #f0f9f4; color: var(--green); }

        .btn-search { background: var(--green); color: white; border: none; padding: 0 30px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 45px; }

        /* Популярные направления - КАРТИНКИ ИЗ ПАПКИ img/ */
        .popular { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .dest-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .dest-card:hover { transform: translateY(-5px); }
        .dest-card img { width: 100%; height: 140px; object-fit: cover; }
        .dest-card p { padding: 12px; font-weight: bold; text-align: center; margin: 0; font-size: 14px; }

        /* Билет */
        .ticket { background: #fff; border-radius: 10px; padding: 20px; margin: 20px auto; max-width: 900px; border: 1px solid #e0e0e0; }
        .ticket-route { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .ticket-grid { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; border-top: 1px solid #f5f5f5; padding-top: 15px; }
        .t-lbl { color: #999; font-size: 11px; margin-bottom: 4px; }
        .t-val { font-size: 18px; font-weight: bold; }
        .ticket-footer { display: flex; justify-content: flex-end; align-items: center; gap: 20px; margin-top: 15px; border-top: 1px solid #f5f5f5; padding-top: 15px; }
        .price { font-size: 24px; font-weight: bold; color: var(--green); }
        .buy-btn { background: var(--green); color: white; border: none; padding: 10px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <i class="fas fa-paper-plane"></i> SAPARTM
    </a>
    <div class="nav-right">
        <div class="lang-switcher">
            <span id="btn-tk" class="active" onclick="changeLang('tk')">TKM</span> | 
            <span id="btn-ru" onclick="changeLang('ru')">РУС</span>
        </div>
        <button class="btn-login"><i class="fas fa-user-circle"></i> <span id="txt-cabinet">Giriş</span></button>
    </div>
</header>

<div class="hero">
    <h1 id="hero-title">HOŞ GELDIŇIZ!</h1>
    <p id="hero-sub">Aşgabat — Dünýäniň gapysy</p>
</div>

<div class="search-container">
    <div class="search-card">
        <div class="field">
            <label id="lbl-from">Nireden</label>
            <input type="text" id="from" placeholder="Ashgabat" autocomplete="off">
            <div id="suggest-from" class="suggestions"></div>
        </div>
        <button onclick="swapCities()" style="background:none; border:none; color:var(--green); cursor:pointer; font-size:18px; margin-bottom:10px;"><i class="fas fa-exchange-alt"></i></button>
        <div class="field">
            <label id="lbl-to">Nirä</label>
            <input type="text" id="to" placeholder="Kazan" autocomplete="off">
            <div id="suggest-to" class="suggestions"></div>
        </div>
        <div class="field">
            <label id="lbl-date">Sene</label>
            <input type="text" id="date" placeholder="Saýlaň...">
        </div>
        <button class="btn-search" onclick="runSearch()" id="btn-search">GÖZLEG</button>
    </div>
</div>

<div class="popular" id="popular-section">
    <h2 id="pop-title" style="text-align:center; margin-bottom:25px;">Meşhur ugurlar</h2>
    <div class="grid">
        <div class="dest-card" onclick="setQuickSearch('Ashgabat (ASB)', 'Istanbul (IST)')">
            <img src="img/stambul.jpg" alt="Istanbul">
            <p>Aşgabat — Stambul</p>
        </div>
        <div class="dest-card" onclick="setQuickSearch('Ashgabat (ASB)', 'Moscow (DME)')">
            <img src="img/moscow.jpg" alt="Moscow">
            <p>Aşgabat — Moskwa</p>
        </div>
        <div class="dest-card" onclick="setQuickSearch('Ashgabat (ASB)', 'Dubai (DXB)')">
            <img src="img/dubai.jpg" alt="Dubai">
            <p>Aşgabat — Dubaý</p>
        </div>
        <div class="dest-card" onclick="setQuickSearch('Ashgabat (ASB)', 'Kazan (KZN)')">
            <img src="img/kazan.jpg" alt="Kazan">
            <p>Aşgabat — Kazan</p>
        </div>
    </div>
</div>

<div id="results-list" style="padding: 0 20px 50px;"></div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="logic.js"></script>
</body>
</html>
