<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SAPAR.TM — LIVE</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #0052cc; color: white; font-weight: bold; cursor: pointer; border: none; }
        .ticket { border: 1px solid #eee; padding: 15px; margin-top: 10px; border-left: 4px solid #0052cc; border-radius: 8px; }
        .price { color: #27ae60; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#0052cc;">SAPAR.TM</h2>
        <input type="text" id="from" placeholder="Откуда (ASB)" value="ASB">
        <input type="text" id="to" placeholder="Куда (KZN)" value="KZN">
        <input type="date" id="date">
        <button onclick="runSearch()">НАЙТИ БИЛЕТЫ</button>
        <div id="out"></div>
    </div>

    <script>
        async function runSearch() {
            const from = document.getElementById('from').value.trim().toUpperCase();
            const to = document.getElementById('to').value.trim().toUpperCase();
            const date = document.getElementById('date').value;
            const out = document.getElementById('out');

            if(!date) return alert("Выбери дату!");
            out.innerHTML = "Ищем реальные билеты...";

            try {
                const response = await fetch('/api/search-live', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ origin: from, destination: to, date: date })
                });
                const data = await response.json();
                out.innerHTML = "";

                if (data.tickets && data.tickets.length > 0) {
                    data.tickets.forEach(t => {
                        const price = t.proposals[0].value;
                        out.innerHTML += `
                            <div class="ticket">
                                <div class="price">${price} RUB</div>
                                <div>${from} ➔ ${to}</div>
                                <a href="https://www.aviasales.ru/search/${from}${date.replace(/-/g,'')}${to}1?marker=716446" target="_blank" style="color:#0052cc; text-decoration:none; font-weight:bold;">Купить билет →</a>
                            </div>`;
                    });
                } else {
                    out.innerHTML = "Билетов не найдено. Попробуй другую дату.";
                }
            } catch (e) {
                out.innerHTML = "Ошибка связи. Проверь логи в Railway.";
            }
        }
    </script>
</body>
</html>
