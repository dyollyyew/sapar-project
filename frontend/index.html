<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tkm-green: #008751; --gold: #d4af37; --sidebar-w: 300px; }
        
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 0; display: flex; height: 100vh; overflow: hidden; background: #f0f2f5;
        }

        /* ЛЕВАЯ ВЕРТИКАЛЬНАЯ ПАНЕЛЬ */
        .sidebar {
            width: var(--sidebar-w);
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .admin-login {
            background: #222; padding: 15px; border-radius: 8px; margin-top: auto; border: 1px solid #333;
        }
        .admin-login input {
            width: 100%; padding: 8px; margin: 5px 0; background: #000; border: 1px solid #444; color: white; font-family: inherit;
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }

        header {
            background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--tkm-green);
        }

        /* АНИМАЦИЯ САМОЛЕТА TKM */
        .plane-line {
            height: 30px; background: #eee; overflow: hidden; position: relative; border-bottom: 1px solid #ddd;
        }
        .flying-plane {
            position: absolute; left: -100px; animation: fly 15s linear infinite; color: var(--tkm-green); font-weight: bold;
        }
        @keyframes fly { from { left: -150px; } to { left: 100%; } }

        /* БИЛЕТЫ */
        .content { padding: 30px; }
        .ticket {
            background: white; margin-bottom: 20px; display: flex; border-radius: 4px; border: 1px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .ticket-info { flex: 3; padding: 20px; display: flex; justify-content: space-around; align-items: center; }
        .price-zone { 
            flex: 1; background: #f9f9f9; border-left: 1px dashed #ccc; padding: 20px; text-align: center; 
        }

        .btn-buy { 
            background: var(--tkm-green); color: white; text-decoration: none; padding: 10px 20px; 
            display: block; margin-top: 10px; font-weight: bold;
        }

        .commission-label { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--tkm-green)">SAPAR.TM</h2>
    <p>Uçuş dolandyryş paneli</p>
    <hr style="width:100%; border: 0.5px solid #333">
    
    <nav>
        <p><i class="fas fa-search"></i> Gözleg</p>
        <p><i class="fas fa-history"></i> Sargytlar</p>
        <p><i class="fas fa-file-invoice"></i> Kwitansiýalar</p>
    </nav>

    <div class="admin-login" id="adminSection">
        <h4 style="margin:0 0 10px 0">Admin Login</h4>
        <input type="text" placeholder="Login" id="admUser">
        <input type="password" placeholder="Parol" id="admPass">
        <button onclick="adminAuth()" style="width:100%; background:var(--tkm-green); border:none; color:white; padding:5px; cursor:pointer">GIRIŞ</button>
    </div>
</div>

<div class="main-wrapper">
    <header>
        <div style="font-size: 24px; font-weight: bold;">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3e/Turkmenistan_Airlines_logo.svg/1200px-Turkmenistan_Airlines_logo.svg.png" height="30" style="vertical-align: middle;">
            TURKMENISTAN AIRLINES
        </div>
        <div>
            <button onclick="setLang('tk')">TKM</button>
            <button onclick="setLang('ru')">РУС</button>
        </div>
    </header>

    <div class="plane-line">
        <div class="flying-plane">
            <i class="fas fa-plane"></i> TKM AIRLINES — СЧАСТЛИВОГО ПУТИ!
        </div>
    </div>

    <div class="content">
        <div class="search-form" style="background:white; padding:20px; display:flex; gap:10px; border:1px solid #ccc; margin-bottom:20px;">
            <input type="text" id="from" value="MOW" style="padding:10px; flex:1">
            <input type="text" id="to" value="ASB" style="padding:10px; flex:1">
            <input type="date" id="date" style="padding:10px; flex:1">
            <button onclick="searchFlights()" style="background:var(--tkm-green); color:white; border:none; padding:0 30px; cursor:pointer">GÖZLEG</button>
        </div>

        <div id="results"></div>
    </div>
</div>

<script>
    async function searchFlights() {
        const from = document.getElementById('from').value.toUpperCase();
        const to = document.getElementById('to').value.toUpperCase();
        const date = document.getElementById('date').value;
        const resDiv = document.getElementById('results');

        resDiv.innerHTML = "Garaşyň...";

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resDiv.innerHTML = "";

            data.tickets.forEach(t => {
                // РАСЧЕТ КОМИССИИ 5%
                const originalPrice = t.price;
                const margin = originalPrice * 0.05;
                const totalPrice = Math.round(originalPrice + margin);

                // ВРЕМЯ (Примерный расчет прибытия +4 часа если нет в API)
                const depTime = new Date(t.departure_at);
                const arrTime = new Date(depTime.getTime() + (4 * 60 * 60 * 1000)); 

                resDiv.innerHTML += `
                    <div class="ticket">
                        <div class="ticket-info">
                            <div><b>${depTime.getHours()}:${String(depTime.getMinutes()).padStart(2,'0')}</b><br>${t.origin}</div>
                            <div style="color:var(--tkm-green)"><i class="fas fa-plane"></i><br><small>Gönümel</small></div>
                            <div><b>${arrTime.getHours()}:${String(arrTime.getMinutes()).padStart(2,'0')}</b><br>${t.destination}</div>
                        </div>
                        <div class="price-zone">
                            <div style="font-size:22px; font-weight:bold">${totalPrice.toLocaleString()} RUB</div>
                            <div class="commission-label">+5% hyzmat tölegi goşuldy</div>
                            <a href="#" onclick="generateReceipt('${t.origin}','${t.destination}','${totalPrice}')" class="btn-buy">SATYN AL</a>
                        </div>
                    </div>`;
            });
        } catch(e) { resDiv.innerHTML = "Error!"; }
    }

    function generateReceipt(o, d, p) {
        alert("Маршрутная квитанция сформирована!\nМаршрут: " + o + " -> " + d + "\nИтого к оплате: " + p + " RUB\nКомиссия 5% включена.");
    }

    function adminAuth() {
        const u = document.getElementById('admUser').value;
        const p = document.getElementById('admPass').value;
        if(u === "admin" && p === "sapar123") {
            alert("LKP-e hoş geldiňiz, Admin!");
            document.getElementById('adminSection').innerHTML = "<h4 style='color:var(--tkm-green)'>Admin: Online</h4><p>Sargytlar: 12</p>";
        } else {
            alert("Ýalňyş login ýa-da parol!");
        }
    }
</script>
</body>
</html>
