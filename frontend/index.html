<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // 1. Инициализация календаря (Важно: формат Y-m-d для API)
    flatpickr("#date-picker", { 
        minDate: "today", 
        dateFormat: "Y-m-d",
        defaultDate: new Date()
    });
<button class="btn-search">GÖZLEG</button>
    // 2. Красивое уведомление (Toast)
    function showMsg(text) {
        const t = document.getElementById('toast');
        document.getElementById('toast-text').innerText = text;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // 3. Главная функция поиска (Связь с твоим Бэкендом)
    async function findTickets() {
        // Извлекаем IATA код из строки (например "Ashgabat (ASB)" -> "ASB")
        const fromRaw = document.getElementById('from').value;
        const toRaw = document.getElementById('to').value;
        const date = document.getElementById('date-picker').value;

        const extractIATA = (str) => {
            const match = str.match(/\((.*?)\)/);
            return match ? match[1] : str;
        };

        const origin = extractIATA(fromRaw).toUpperCase();
        const destination = extractIATA(toRaw).toUpperCase();

        if (!origin || !destination || !date) {
            showMsg("Maglumatlary dolduryň!");
            return;
        }

        showMsg("Gözleg başlandy...");
        
        const resultsDiv = document.getElementById('results-container');
        const listDiv = document.getElementById('flights-list');

        try {
            // Запрос к твоему Node.js серверу
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin, destination, date })
            });

            const data = await response.json();

            if (data.success && data.tickets.length > 0) {
                resultsDiv.style.display = 'block';
                listDiv.innerHTML = data.tickets.map(t => `
                    <div style="background:white; padding:20px; border-radius:15px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 5px solid #008755;">
                        <div>
                            <strong style="font-size:18px;">${t.origin} ✈ ${t.destination}</strong><br>
                            <span style="color:#666; font-size:13px;">Reýs: ${t.flight_number} | Kompaniýa: ${t.airline}</span><br>
                            <small>Sene: ${new Date(t.departure_at).toLocaleString()}</small>
                        </div>
                        <div style="text-align:right;">
                            <span style="color:#008755; font-weight:bold; font-size:22px;">${t.price} RUB</span><br>
                            <button class="btn-search" style="padding:10px 20px; font-size:14px; margin-top:10px;" onclick="buyTicket('${t.origin}-${t.destination}', '${t.price} RUB')">SATYN AL</button>
                        </div>
                    </div>
                `).join('');
                resultsDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                showMsg("Reýs tapylmady.");
                resultsDiv.style.display = 'none';
            }
        } catch (err) {
            console.error(err);
            showMsg("Сервер недоступен");
        }
    }

    // 4. Логика покупки (сохранение в LocalStorage)
    function buyTicket(route, price) {
        let tickets = JSON.parse(localStorage.getItem('myTickets') || '[]');
        tickets.push({ route, price, date: new Date().toLocaleDateString(), id: Date.now() });
        localStorage.setItem('myTickets', JSON.stringify(tickets));
        showMsg("Bilet satyn alyndy!");
    }

    // 5. Вспомогательные функции
    function swap() {
        const f = document.getElementById('from'), t = document.getElementById('to');
        [f.value, t.value] = [t.value, f.value];
    }

    function fill(f, t) {
        document.getElementById('from').value = f;
        document.getElementById('to').value = t;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function toggleMenu() {
        const m = document.getElementById('profile-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    // Привязываем функцию к кнопке в HTML
    document.querySelector('.btn-search').onclick = findTickets;
</script>
