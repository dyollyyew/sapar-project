<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM — Поиск билетов</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #0052cc; margin-bottom: 25px; font-weight: bold; }
        .search-form { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        /* Кнопка теперь четко синяя с правильным текстом */
        button { padding: 14px; background-color: #0052cc; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 600; text-transform: uppercase; }
        button:hover { background-color: #003d99; }
        #results { margin-top: 20px; text-align: left; font-size: 14px; }
        .ticket { border-left: 4px solid #0052cc; padding: 10px; margin-bottom: 10px; background: #f9f9f9; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SAPAR.TM</h1>
    <div class="search-form">
        <input type="text" id="fromCity" list="cities" placeholder="Откуда (например, Ашхабад)">
        <input type="text" id="toCity" list="cities" placeholder="Куда (например, Казань)">
        
        <datalist id="cities">
            <option value="Ашхабад (ASB)">
            <option value="Казань (KZN)">
            <option value="Москва (MOW)">
            <option value="Стамбул (IST)">
            <option value="Дубай (DXB)">
        </datalist>

        <input type="date" id="travelDate">
        <button id="searchBtn">Найти билеты</button>
    </div>
    <div id="results"></div>
</div>

<script>
    const API_URL = 'https://sapar-project-production.up.railway.app';

    function getIataCode(str) {
        const match = str.match(/\(([^)]+)\)/);
        return match ? match[1] : str.toUpperCase().trim();
    }

    document.getElementById('searchBtn').onclick = async function() {
        const fromInput = document.getElementById('fromCity').value;
        const toInput = document.getElementById('toCity').value;
        const dateInput = document.getElementById('travelDate').value;
        const resultsDiv = document.getElementById('results');

        if (!fromInput || !toInput || !dateInput) {
            alert("Пожалуйста, заполните все поля");
            return;
        }

        const from = getIataCode(fromInput);
        const to = getIataCode(toInput);

        resultsDiv.innerHTML = '<p style="text-align:center;">Поиск реальных рейсов...</p>';

        try {
            const response = await fetch(`${API_URL}/api/search?origin=${from}&destination=${to}&date=${dateInput}`);
            
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            resultsDiv.innerHTML = '';

            if (data && data.length > 0) {
                data.forEach(flight => {
                    resultsDiv.innerHTML += `
                        <div class="ticket">
                            <strong>Цена: ${flight.value} RUB</strong><br>
                            <span>Рейс: ${flight.origin} → ${flight.destination}</span><br>
                            <small>Дата: ${flight.depart_date}</small>
                        </div>`;
                });
            } else {
                resultsDiv.innerHTML = '<p>На эту дату рейсов не найдено. Попробуйте поискать на соседние даты (например, через неделю).</p>';
            }
        } catch (err) {
            resultsDiv.innerHTML = '<p style="color:red;">Ошибка связи с API. Убедитесь, что сервер на Railway запущен.</p>';
        }
    };
</script>

</body>
</html>
