<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SAPAR.TM — Оплата МИР</title>
    <style>
        :root { --mir-blue: #224099; --mir-green: #00a550; --accent: #ff5e62; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; }
        .header { background: var(--mir-blue); color: white; padding: 15px 5%; display: flex; justify-content: space-between; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn-mir { background: var(--mir-green); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        .mir-logo { height: 30px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .ticket { background: white; padding: 20px; border-radius: 10px; border-left: 8px solid var(--mir-blue); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:1000; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 24px; font-weight: bold;">SAPAR.TM <span style="font-size:12px; font-weight:normal;">| Оплата МИР</span></div>
    <div id="user-nav"></div>
</div>

<div class="container">
    <div id="auth-box" class="card">
        <h3>Вход в систему</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn-mir" style="background:var(--mir-blue);" onclick="login()">ВОЙТИ</button>
        <p style="text-align:center; font-size:13px; color:blue; cursor:pointer;" onclick="alert('Используйте тестовый email')">Регистрация</p>
    </div>

    <div id="search-box" class="card" style="display:none;">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <select id="from"></select>
            <select id="to"></select>
            <input type="date" id="dateS" value="2026-04-05">
        </div>
        <button class="btn-mir" onclick="search()">НАЙТИ БИЛЕТЫ</button>
    </div>

    <div id="results"></div>
</div>

<div id="modal" class="modal">
    <div class="card" style="width:400px; border-top: 5px solid var(--mir-green);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:bold; color:var(--mir-blue);">ОПЛАТА КАРТОЙ МИР</span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/Mir-logo.svg" class="mir-logo">
        </div>
        
        <label>Данные пассажира (LATIN)</label>
        <input type="text" id="pName" placeholder="ИМЯ ФАМИЛИЯ" style="text-transform:uppercase;">
        <input type="text" id="pDoc" placeholder="ПАСПОРТ">

        <div style="background:#f0f4f8; padding:15px; border-radius:8px; margin-top:10px;">
            <label>Номер карты МИР</label>
            <input type="text" id="cardNum" placeholder="2000 0000 0000 0000" maxlength="19">
            <div style="display:flex; gap:10px;">
                <input type="text" id="cardDate" placeholder="ММ/ГГ" maxlength="5">
                <input type="password" id="cardCVC" placeholder="CVC" maxlength="3">
            </div>
        </div>

        <div style="margin:15px 0; font-weight:bold; display:flex; justify-content:space-between;">
            <span>К оплате (+5%):</span>
            <span id="priceDisplay" style="color:var(--mir-green);">0 TMT</span>
        </div>

        <button class="btn-mir" onclick="payNow()" id="payBtn">ОПЛАТИТЬ</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script>
    const API = 'https://sapar-project-production.up.railway.app';
    let user = JSON.parse(localStorage.getItem('s_user'));
    let curTk = null;

    window.onload = async () => {
        if(user) showUI();
        const res = await fetch(`${API}/api/cities`);
        const cities = await res.json();
        cities.forEach(c => {
            document.getElementById('from').add(new Option(c, c));
            document.getElementById('to').add(new Option(c, c));
        });
    };

    function showUI() {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('search-box').style.display = 'block';
        document.getElementById('user-nav').innerText = user.name;
    }

    async function login() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        const res = await fetch(`${API}/api/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:e, password:p}) });
        const data = await res.json();
        if(data.success) { localStorage.setItem('s_user', JSON.stringify(data.user)); location.reload(); }
    }

    async function search() {
        const f = document.getElementById('from').value, t = document.getElementById('to').value, d = document.getElementById('dateS').value;
        const res = await fetch(`${API}/api/search?from=${f}&to=${t}&date=${d}`);
        const data = await res.json();
        const div = document.getElementById('results'); div.innerHTML = '';
        data.forEach(tk => {
            const finalP = (tk.price * 1.05).toFixed(0);
            div.innerHTML += `<div class="ticket">
                <div><b>${tk.time}</b><br><small>${tk.airline}</small></div>
                <div style="text-align:right"><b>${finalP} TMT</b><br>
                <button class="btn-mir" style="padding:5px 15px; width:auto; margin-top:5px;" onclick='openPay(${JSON.stringify(tk)})'>ВЫБРАТЬ</button></div>
            </div>`;
        });
    }

    function openPay(tk) {
        curTk = tk;
        document.getElementById('priceDisplay').innerText = (tk.price * 1.05).toFixed(2) + " TMT";
        document.getElementById('modal').style.display = 'flex';
    }

    async function payNow() {
        const card = document.getElementById('cardNum').value;
        if(!card.startsWith('2')) return alert("Ошибка: Используйте карту МИР (номер начинается на 2)");

        document.getElementById('payBtn').innerText = "СВЯЗЬ С БАНКОМ...";
        document.getElementById('payBtn').disabled = true;

        const nameParts = document.getElementById('pName').value.split(' ');
        
        const res = await fetch(`${API}/api/pay-mir`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                trip_id: curTk.id,
                user_id: user.id,
                name: nameParts[0],
                surname: nameParts[1] || '',
                passport: document.getElementById('pDoc').value,
                price: curTk.price,
                email: user.email,
                route: `${curTk.departure} -> ${curTk.arrival}`,
                f_date: curTk.date,
                card_number: card
            })
        });

        if(res.ok) {
            alert("Оплата прошла успешно! Билет отправлен на почту.");
            location.reload();
        } else {
            alert("Ошибка платежа");
            document.getElementById('payBtn').disabled = false;
        }
    }
</script>
</body>
</html>
