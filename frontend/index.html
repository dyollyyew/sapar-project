<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM - Счастливого пути!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #27ae60;
            --carpet-red: #8b0000; 
            --header-bg: #f2f5f8; /* Тот самый серый фон для шапки */
            --dark-gray: #1e293b;
            --gold: #d4af37;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; }

        /* ШАПКА ПО ТВОЕМУ ЗАПРОСУ */
        header {
            background: var(--header-bg); /* Серый фон */
            padding: 15px 10%; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo { 
            font-size: 28px; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: #000; /* Надпись черная */
        }
        .logo i { 
            color: var(--primary-green); /* Логотип зеленый */
            font-size: 32px; 
        }

        .lang-switcher button {
            background: white; border: 1px solid #ddd; padding: 8px 15px;
            border-radius: 8px; cursor: pointer; font-weight: 700;
        }
        .lang-switcher button.active { background: var(--dark-gray); color: white; }

        /* БЛОК С ЧИСТЫМ КОВРОМ */
        .hero {
            position: relative;
            /* Ссылка на качественный паттерн туркменского ковра */
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.7)), /* Темный градиент */
                url('https://st3.depositphotos.com/1053646/15197/v/450/depositphotos_151975054-stock-illustration-traditional-turkmen-pattern.jpg'); 
            background-size: cover, 450px; /* Размер ковра чтобы было видно гёли */
            background-repeat: no-repeat, repeat;
            padding: 120px 20px 180px; 
            text-align: center; 
            color: white;
            border-bottom: 4px solid var(--gold);
        }
        
        .hero h2 { font-size: 48px; margin: 0; font-weight: 900; text-shadow: 2px 4px 10px rgba(0,0,0,0.8); }
        .hero p { font-size: 20px; margin-top: 10px; opacity: 0.9; text-shadow: 1px 2px 5px rgba(0,0,0,0.5); }

        /* ПОИСКОВАЯ КАРТОЧКА */
        .search-container { max-width: 1100px; margin: -90px auto 50px; padding: 0 20px; }
        .search-card {
            background: white; padding: 35px; border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)) auto; gap: 20px;
        }

        .input-group label { display: block; margin-bottom: 10px; font-size: 13px; font-weight: 800; color: #64748b; }
        .input-group { position: relative; }
        .input-group input {
            width: 100%; padding: 15px 15px 15px 50px; border: 2px solid #f1f5f9;
            border-radius: 12px; font-size: 16px; box-sizing: border-box;
        }
        .input-group i { position: absolute; left: 18px; top: 43px; color: var(--primary-green); font-size: 20px; }

        .btn-search {
            background: var(--primary-green); color: white; border: none;
            padding: 0 40px; border-radius: 12px; font-weight: 900;
            cursor: pointer; height: 55px; font-size: 18px; transition: 0.3s;
        }
        .btn-search:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3); }

        /* БИЛЕТЫ */
        .ticket {
            background: white; border-radius: 20px; display: flex; margin-bottom: 25px;
            border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .t-side { width: 220px; padding: 30px; background: #fafafa; border-right: 1px dashed #ddd; text-align: center; }
        .price { font-size: 30px; font-weight: 900; color: #1e293b; margin-bottom: 15px; display: block; }
        .btn-buy {
            background: var(--carpet-red); color: white; text-decoration: none;
            padding: 12px 25px; border-radius: 10px; font-weight: 800; display: block;
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fa-solid fa-paper-plane"></i> SAPAR.TM</div>
    <div class="lang-switcher">
        <button onclick="setLang('ru')" id="btn-ru" class="active">RU</button>
        <button onclick="setLang('tm')" id="btn-tm">TM</button>
        <button onclick="setLang('en')" id="btn-en">EN</button>
    </div>
</header>

<div class="hero">
    <h2 id="hero-title">Saparaly syýahatlar biziň bilen</h2>
    <p id="hero-desc">Dünýäniň ähli künjegine iň amatly uçuşlar</p>
</div>

<div class="search-container">
    <div class="search-card">
        <div class="input-group">
            <label id="lbl-from">Nireden</label>
            <i class="fa-solid fa-plane-departure"></i>
            <input type="text" id="from" placeholder="MOW" value="MOW">
        </div>
        <div class="input-group">
            <label id="lbl-to">Nirä</label>
            <i class="fa-solid fa-plane-arrival"></i>
            <input type="text" id="to" placeholder="KZN" value="KZN">
        </div>
        <div class="input-group">
            <label id="lbl-date">Sene</label>
            <i class="fa-solid fa-calendar-alt"></i>
            <input type="date" id="date">
        </div>
        <button class="btn-search" onclick="searchTickets()" id="btn-search-text">GOZLEG</button>
    </div>
    <div id="res"></div>
</div>

<script>
    // Весь твой JS остается без изменений
    const translations = {
        ru: { title: "Путешествуйте с комфортом", desc: "Удобный поиск билетов по всему миру", from: "Откуда", to: "Куда", date: "Дата вылета", search: "ПОИСК", buy: "КУПИТЬ", loading: "Ищем билеты..." },
        tm: { title: "Saparaly syýahatlar", desc: "Dünýäniň ähli künjegine uçuşlar", from: "Nireden", to: "Nirä", date: "Sene", search: "GOZLEG", buy: "SATYN AL", loading: "Gözlenilýär..." },
        en: { title: "Travel with Comfort", desc: "Best flights worldwide", from: "Origin", to: "Destination", date: "Date", search: "SEARCH", buy: "BUY", loading: "Searching..." }
    };

    let currentLang = 'ru';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-switcher button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        document.getElementById('hero-title').innerText = translations[lang].title;
        document.getElementById('hero-desc').innerText = translations[lang].desc;
        document.getElementById('lbl-from').innerText = translations[lang].from;
        document.getElementById('lbl-to').innerText = translations[lang].to;
        document.getElementById('lbl-date').innerText = translations[lang].date;
        document.getElementById('btn-search-text').innerText = translations[lang].search;
    }

    async function searchTickets() {
        const resDiv = document.getElementById('res');
        const from = document.getElementById('from').value.trim();
        const to = document.getElementById('to').value.trim();
        const date = document.getElementById('date').value;

        if (!from || !to || !date) return alert("Fill all!");

        resDiv.innerHTML = `<div style='text-align:center; padding:50px; color:#8b0000; font-weight:bold;'>${translations[currentLang].loading}</div>`;

        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ origin: from, destination: to, date: date })
            });
            const data = await response.json();
            resDiv.innerHTML = "";

            if (data.tickets && data.tickets.length > 0) {
                data.tickets.forEach(t => {
                    resDiv.innerHTML += `
                        <div class="ticket">
                            <div class="t-side">
                                <span class="price">${t.price.toLocaleString()} ₽</span>
                                <a class="btn-buy" href="https://www.aviasales.ru${t.link}" target="_blank">${translations[currentLang].buy}</a>
                            </div>
                            <div style="flex:1; padding:30px;">
                                <div style="font-weight:900; color:#8b0000; margin-bottom:15px;">${t.airline}</div>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div><div style="font-size:24px; font-weight:900;">${new Date(t.departure_at).getHours()}:${String(new Date(t.departure_at).getMinutes()).padStart(2, '0')}</div><div style="color:#64748b">${t.origin}</div></div>
                                    <div style="flex:1; border-bottom:2px dashed #ddd; margin:0 20px; position:relative; top:-5px;"><i class="fa-solid fa-plane" style="position:absolute; left:50%; top:-10px; background:white; padding:0 10px; color:var(--gold);"></i></div>
                                    <div style="text-align:right;"><div style="font-size:24px; font-weight:900;">--:--</div><div style="color:#64748b">${t.destination}</div></div>
                                </div>
                            </div>
                        </div>`;
                });
            } else {
                resDiv.innerHTML = "<div style='text-align:center; padding:50px;'>☹️ Ничего не найдено</div>";
            }
        } catch (e) { resDiv.innerHTML = "Error!"; }
    }
</script>
</body>
</html>
