<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SAPAR.TM — Поиск с фильтрами</title>
    <style>
        :root { --main: #00873d; --accent: #ff5e62; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f3f5; margin: 0; }
        .header { background: var(--main); color: white; padding: 20px; text-align: center; font-weight: 900; font-size: 26px; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .search-area { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-find { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 16px; }
        
        /* Стили Фильтра */
        .filter-bar { background: #fff; padding: 15px; border-radius: 10px; margin-top: 20px; display: flex; align-items: center; gap: 20px; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .filter-bar label { font-weight: bold; color: #555; }

        .ticket-card { background: white; margin-top: 15px; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid transparent; transition: 0.3s; }
        .ticket-card:hover { border-left-color: var(--main); transform: translateY(-2px); }
        .airline-logo { font-weight: bold; color: #333; font-size: 18px; }
        .time-info { color: #666; }
        .price-tag { color: var(--main); font-size: 24px; font-weight: bold; }
        .btn-go { background: var(--main); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">SAPAR.TM</div>

<div class="container">
    <div class="search-area">
        <div class="grid">
            <select id="from"></select>
            <select id="to"></select>
            <input type="date" id="dateS" value="2026-04-05">
        </div>
        <button class="btn-find" onclick="search()">GÖZLE (НАЙТИ)</button>
    </div>

    <div class="filter-bar" id="filterBar">
        <label>Фильтр:</label>
        <select id="filterAirline" onchange="applyFilters()" style="width: 200px;">
            <option value="all">Все авиакомпании</option>
        </select>
        <select id="filterPrice" onchange="applyFilters()" style="width: 200px;">
            <option value="cheap">Сначала дешевые</option>
            <option value="fast">Самые ранние</option>
        </select>
    </div>

    <div id="results"></div>
</div>

<script>
    const API = 'https://sapar-project-production.up.railway.app';
    let allResults = [];

    window.onload = async () => {
        const res = await fetch(`${API}/api/cities`);
        const cities = await res.json();
        const f = document.getElementById('from'), t = document.getElementById('to');
        cities.forEach(c => {
            f.add(new Option(c, c));
            t.add(new Option(c, c));
        });
    };

    async function search() {
        const f = document.getElementById('from').value;
        const t = document.getElementById('to').value;
        const d = document.getElementById('dateS').value;

        const res = await fetch(`${API}/api/search?from=${encodeURIComponent(f)}&to=${encodeURIComponent(t)}&date=${d}`);
        allResults = await res.json();
        
        // Заполняем список компаний в фильтре
        const filterSelect = document.getElementById('filterAirline');
        filterSelect.innerHTML = '<option value="all">Все авиакомпании</option>';
        const airlines = [...new Set(allResults.map(item => item.airline))];
        airlines.forEach(a => filterSelect.add(new Option(a, a)));

        document.getElementById('filterBar').style.display = 'flex';
        applyFilters();
    }

    function applyFilters() {
        const airline = document.getElementById('filterAirline').value;
        const sort = document.getElementById('filterPrice').value;

        let filtered = [...allResults];

        if (airline !== 'all') {
            filtered = filtered.filter(item => item.airline === airline);
        }

        if (sort === 'cheap') {
            filtered.sort((a, b) => a.price - b.price);
        } else {
            filtered.sort((a, b) => a.time.localeCompare(b.time));
        }

        render(filtered);
    }

    function render(data) {
        const div = document.getElementById('results');
        div.innerHTML = data.length ? '' : '<p style="text-align:center; margin-top:30px;">Ничего не найдено.</p>';

        data.forEach(tk => {
            const finalPrice = (tk.price * 1.05).toFixed(0);
            div.innerHTML += `
                <div class="ticket-card">
                    <div>
                        <div class="airline-logo">${tk.airline}</div>
                        <div class="time-info">Вылет: <b>${tk.time}</b></div>
                    </div>
                    <div style="text-align:right">
                        <div class="price-tag">${finalPrice} TMT</div>
                        <button class="btn-go" onclick="window.open('${tk.official_url}', '_blank')">
                            ОФИЦИАЛЬНЫЙ САЙТ
                        </button>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
