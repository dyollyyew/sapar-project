<style>/* Стили для карточки билета */
.ticket-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 25px;
    margin: 20px auto;
    max-width: 850px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); /* Мягкая тень */
    border: 1px solid #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
}

/* Стили для выпадающего меню ЛК как на макете */
.dropdown-card {
    display: none;
    position: absolute;
    right: 20px;
    top: 70px;
    width: 280px;
    background: white;
    border-radius: 20px; /* Сильное закругление как на макете */
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    padding: 15px;
    z-index: 1000;
}

.menu-item {
    display: flex;
    align-items: center;
    padding: 12px 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    color: #333;
}

.menu-item:hover, .menu-item.active {
    background: #f0f4f8; /* Цвет выделения как на image_836908.png */
}

.menu-item i {
    margin-right: 15px;
    color: #7d8b9a;
}
