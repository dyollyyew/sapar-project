<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM — Официальный сервис поиска</title>
    <style>
        :root { --main: #00873d; --accent: #ff5e62; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f3f5; margin: 0; }
        .header { background: var(--main); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: none; border: 1px solid white; color: white; padding: 6px 15px; cursor: pointer; border-radius: 20px; font-size: 13px; margin-left: 5px; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .search-grid { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr 1fr 0.8fr; gap: 15px; align-items: end; }
        label { font-size: 12px; color: #777; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border: 1px solid #d1d1d1; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-find { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-find:hover { background: #e04a4e; transform: translateY(-2px); }
        .ticket { background: white; padding: 25px; border-radius: 12px; border-left: 10px solid var(--main); display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1000; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 26px; font-weight: 900; letter-spacing: 1px;">SAPAR.TM</div>
    <div id="top-nav">
        <button class="nav-btn" onclick="setLang('tk')">Turkmen</button>
        <button class="nav-btn" onclick="setLang('ru')">Русский</button>
        <button class="nav-btn" onclick="setLang('en')">English</button>
        <button class="nav-btn" id="btn-cab" onclick="toggleCab()" style="background:white; color:var(--main); display:none; font-weight:bold;">Account</button>
    </div>
</div>

<div class="container">
    <div id="auth-box" class="card">
        <div id="l-form">
            <h3>Giriş / Вход</h3>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-find" onclick="login()">LOG IN</button>
            <p onclick="showReg(true)" style="color:#0056b3; cursor:pointer; text-align:center; margin-top:15px;">Agza bolmak / Регистрация</p>
        </div>
        <div id="r-form" style="display:none;">
            <h3>Agza bolmak / Регистрация</h3>
            <input type="text" id="rName" placeholder="Full Name (Latin)">
            <input type="email" id="rEmail" placeholder="Email">
            <input type="password" id="rPass" placeholder="Password">
            <input type="text" id="rPasp" placeholder="Passport Series">
            <button class="btn-find" onclick="register()">REGISTER</button>
            <p onclick="showReg(false)" style="color:#0056b3; cursor:pointer; text-align:center; margin-top:15px;">Back to Login</p>
        </div>
    </div>

    <div id="search-box" class="card" style="display:none;">
        <div class="search-grid">
            <div><label id="l-from">Nireden (Откуда)</label><select id="from"></select></div>
            <div><label id="l-to">Nirä (Куда)</label><select id="to"></select></div>
            <div><label id="l-date">Haçan (Туда)</label><input type="date" id="dateS"></div>
            <div><label id="l-back">Yza (Обратно)</label><input type="date" id="dateE"></div>
            <div><label id="l-who">Kim (Кто)</label><select><option>1 Ýolagçy</option><option>2 Ýolagçy</option></select></div>
        </div>
        <button class="btn-find" onclick="search()" id="b-find">BILET TAPMAK (НАЙТИ)</button>
    </div>

    <div id="cab-box" class="card" style="display:none;">
        <h3 id="t-my">Meniň biletlerim</h3>
        <div id="my-list"></div>
    </div>

    <div id="results"></div>
</div>

<div id="modal" class="modal">
    <div class="card" style="width:400px;">
        <h3 id="t-pass">Ýolagçy maglumaty (LATIN)</h3>
        <input type="text" id="pName" placeholder="NAME" oninput="this.value=this.value.replace(/[^A-Za-z]/g,'').toUpperCase()">
        <input type="text" id="pSurname" placeholder="SURNAME" oninput="this.value=this.value.replace(/[^A-Za-z]/g,'').toUpperCase()">
        <input type="text" id="pDoc" placeholder="PASSPORT SERIES">
        <p style="font-size:12px; color:#e04a4e;" id="l-fee">* 5% Komissiýa goşuldy</p>
        <button class="btn-find" onclick="confirmBook()">TASSYKLAMAK & TÖLEMEK</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">Yza</button>
    </div>
</div>

<script>
    const API = 'https://sapar-project-production.up.railway.app';
    let user = JSON.parse(localStorage.getItem('s_user'));
    let curTk = null;

    const i18n = {
        ru: { from:"Откуда", to:"Куда", date:"Туда", find:"НАЙТИ БИЛЕТЫ", my:"Мои билеты", pass:"Данные пассажира (LATIN)", fee:"* Комиссия 5% включена" },
        tk: { from:"Nireden", to:"Nirä", date:"Haçan", find:"BILET TAPMAK", my:"Meniň biletlerim", pass:"Ýolagçy maglumaty (LATIN)", fee:"* 5% Komissiýa goşuldy" },
        en: { from:"From", to:"To", date:"Departure", find:"SEARCH FLIGHTS", my:"My Bookings", pass:"Passenger Data (LATIN)", fee:"* 5% Service Fee included" }
    };

    function setLang(l) {
        document.getElementById('l-from').innerText = i18n[l].from;
        document.getElementById('l-to').innerText = i18n[l].to;
        document.getElementById('b-find').innerText = i18n[l].find;
        document.getElementById('t-my').innerText = i18n[l].my;
        document.getElementById('t-pass').innerText = i18n[l].pass;
        document.getElementById('l-fee').innerText = i18n[l].fee;
    }

    window.onload = async () => {
        if(user) { document.getElementById('auth-box').style.display='none'; document.getElementById('search-box').style.display='block'; document.getElementById('btn-cab').style.display='inline-block'; }
        const res = await fetch(`${API}/api/cities`);
        const cities = await res.json();
        cities.forEach(c => { document.getElementById('from').add(new Option(c, c)); document.getElementById('to').add(new Option(c, c)); });
        document.getElementById('dateS').value = "2026-04-05";
        setLang('tk');
    };

    async function login() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        const res = await fetch(`${API}/api/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:e, password:p}) });
        const data = await res.json();
        if(data.success) { localStorage.setItem('s_user', JSON.stringify(data.user)); location.reload(); } else alert("Error");
    }

    async function register() {
        const n = document.getElementById('rName').value, e = document.getElementById('rEmail').value, p = document.getElementById('rPass').value, ps = document.getElementById('rPasp').value;
        await fetch(`${API}/api/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:n, email:e, password:p, passport:ps}) });
        alert("Success! Now Login."); showReg(false);
    }

    function showReg(s) { document.getElementById('l-form').style.display = s ? 'none' : 'block'; document.getElementById('r-form').style.display = s ? 'block' : 'none'; }

    async function search() {
        const f = document.getElementById('from').value, t = document.getElementById('to').value, d = document.getElementById('dateS').value;
        const res = await fetch(`${API}/api/search?from=${f}&to=${t}&date=${d}`);
        const data = await res.json();
        const div = document.getElementById('results'); div.innerHTML = '';
        data.forEach(tk => {
            const priceWithFee = (tk.price * 1.05).toFixed(0);
            div.innerHTML += `<div class="ticket">
                <div><b style="font-size:22px;">${tk.time}</b><br><small>${tk.airline}</small></div>
                <div style="text-align:right"><b style="color:var(--main); font-size:24px;">${priceWithFee} TMT</b><br>
                <button class="btn-find" style="width:auto; padding:8px 20px; margin-top:5px;" onclick='openModal(${JSON.stringify(tk)})'>SATYN AL</button></div>
            </div>`;
        });
    }

    function openModal(tk) { curTk = tk; document.getElementById('modal').style.display='flex'; }
    function closeModal() { document.getElementById('modal').style.display='none'; }

    async function confirmBook() {
        const n = document.getElementById('pName').value, s = document.getElementById('pSurname').value, p = document.getElementById('pDoc').value;
        if(!n || !s || !p) return alert("Fill Latin!");
        const res = await fetch(`${API}/api/book`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ trip_id:curTk.id, user_id:user.id, name:n, surname:s, passport:p, price:curTk.price, email:user.email, route:`${curTk.departure} -> ${curTk.arrival}`, f_date:curTk.date })
        });
        if(res.ok) { alert("Ticket sent to Email!"); closeModal(); }
    }

    function toggleCab() {
        const b = document.getElementById('cab-box');
        b.style.display = b.style.display === 'none' ? 'block' : 'none';
        if(b.style.display==='block') loadMy();
    }

    async function loadMy() {
        const res = await fetch(`${API}/api/my-bookings?userId=${user.id}`);
        const data = await res.json();
        const div = document.getElementById('my-list'); div.innerHTML = '';
        data.forEach(b => { div.innerHTML += `<div style="padding:15px; border-bottom:1px solid #eee;"><b>${b.route}</b><br>${b.flight_date} | ${b.total_price} TMT</div>`; });
    }
</script>
</body>
</html>
