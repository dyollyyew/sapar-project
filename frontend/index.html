<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <title>SAPARTM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    </head>
<body>
<header>
    <a href="/" class="logo"><i class="fas fa-paper-plane"></i> SAPARTM</a>
    <div style="display:flex; gap:15px;">
        <button class="btn-login" id="user-btn" onclick="toggleModal(true)">Profil</button>
        <div class="lang-switcher">
            <span onclick="changeLang('tk')" id="btn-tk" class="active">TKM</span>
            <span onclick="changeLang('ru')" id="btn-ru">РУС</span>
        </div>
    </div>
</header>

<div class="hero"><h1 id="hero-title">HOŞ GELDIŇIZ!</h1></div>

<div id="lk-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:15px; width:320px;">
        <h3 style="color:var(--green)">Giriş / Profil</h3>
        <input type="text" id="u-fio" placeholder="F.I.O. (Batyr Batyrow)" style="width:100%; margin:10px 0; padding:10px;">
        <input type="text" id="u-pass" placeholder="Pasport (A1904657)" style="width:100%; margin:10px 0; padding:10px;">
        <button class="buy-btn" onclick="saveUser()" style="width:100%">Ýatda sakla</button>
        <button onclick="toggleModal(false)" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:10px;">Ýap</button>
    </div>
</div>

<div id="results-list"></div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="logic.js"></script>
</body>
</html>
