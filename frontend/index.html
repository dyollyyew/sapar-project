<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <title>SAPAR.TM</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; text-align: center; }
        .header { background: #1a8a42; color: white; padding: 20px; font-size: 24px; }
        .box { max-width: 400px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #ff5e62; color: white; border: none; cursor: pointer; font-weight: bold; }
        .ticket { background: white; padding: 15px; margin: 10px auto; max-width: 400px; border-radius: 8px; border-left: 5px solid #1a8a42; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="header">SAPAR.TM</div>
    <div class="box">
        <label>Nireden:</label> <select id="from"><option>Ýüklenýär...</option></select>
        <label>Nirä:</label> <select id="to"><option>Ýüklenýär...</option></select>
        <button onclick="search()">Gözle</button>
    </div>
    <div id="results"></div>

    <script>
        const API = 'https://sapar-project-production.up.railway.app';

        async function loadCities() {
            try {
                const res = await fetch(`${API}/api/cities`);
                const cities = await res.json();
                const f = document.getElementById('from'), t = document.getElementById('to');
                f.innerHTML = ''; t.innerHTML = '';
                cities.forEach(c => { f.add(new Option(c, c)); t.add(new Option(c, c)); });
            } catch (e) { console.error("Ошибка:", e); }
        }

        async function search() {
            const f = document.getElementById('from').value, t = document.getElementById('to').value;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = 'Garaşyň...';
            const res = await fetch(`${API}/api/search?from=${encodeURIComponent(f)}&to=${encodeURIComponent(t)}`);
            const data = await res.json();
            resDiv.innerHTML = data.length ? '' : 'Bilet tapylmady.';
            data.forEach(ticket => {
                resDiv.innerHTML += `<div class="ticket">
                    <div><b>${ticket.time}</b><br><small>${ticket.airline}</small></div>
                    <div style="text-align:right"><b>${ticket.price} TMT</b><br><button style="width:auto;padding:5px" onclick="alert('OK!')">Al</button></div>
                </div>`;
            });
        }
        window.onload = loadCities;
    </script>
</body>
</html>
