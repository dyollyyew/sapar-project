<div class="main-content">
    <div class="top-bar">
        <div class="user-trigger" onclick="openModal('login')" style="cursor:pointer; margin-right: 15px; color: var(--tkm-green);">
            <i class="fas fa-user-circle" style="font-size: 20px;"></i>
        </div>
        <div class="lang-switcher">
            <span onclick="setLang('tk')" style="cursor:pointer; font-weight:bold;">TKM</span> | 
            <span onclick="setLang('ru')" style="cursor:pointer; font-weight:bold;">РУС</span>
        </div>
    </div>
    </div>

<script>
    // --- НОВАЯ ЛОГИКА ВХОДА И ВЫХОДА ---

    function doAuth() {
        const u = document.getElementById('u').value;
        if (!u) return alert("Логин ýazyň!");

        // Показываем секцию пользователя, скрываем гостевую
        document.getElementById('userSection').style.display = 'block';
        document.getElementById('guestSection').style.display = 'none';
        
        // Если админ
        if(u === 'admin') {
            document.getElementById('adminBtn').style.display = 'flex';
        }

        closeModal();
        console.log("Logged in as:", u);
    }

    function logout() {
        // Скрываем секцию пользователя, возвращаем гостевую
        document.getElementById('userSection').style.display = 'none';
        document.getElementById('guestSection').style.display = 'block';
        document.getElementById('adminBtn').style.display = 'none';
        
        // Очистка полей поиска (по желанию)
        document.getElementById('results').innerHTML = "";
        alert("Siz ulgamdan çykdyňyz / Вы вышли из системы"); [cite: 1, 5]
    }

    // Изменение иконки в top-bar в зависимости от статуса (опционально)
    function updateTopBarIcon(isLoggedIn) {
        const icon = document.querySelector('.user-trigger i');
        if(isLoggedIn) {
            icon.style.color = 'var(--tkm-gold)';
        } else {
            icon.style.color = 'var(--tkm-green)';
        }
    }
</script>

<style>
    /* Дополнение к стилям */
    .top-bar {
        display: flex;
        align-items: center; /* Центрирование иконки и текста по вертикали */
        justify-content: flex-end;
    }
    
    .user-trigger:hover {
        opacity: 0.7;
        transform: scale(1.1);
        transition: 0.2s;
    }
</style>
