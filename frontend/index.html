<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM — Hyzmatlar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .nav-bar { background: #00873d; color: white; display: flex; justify-content: space-around; padding: 15px; position: sticky; top: 0; z-index: 100; }
        .nav-item { cursor: pointer; font-weight: bold; opacity: 0.8; }
        .nav-item:hover, .active { opacity: 1; border-bottom: 2px solid white; }
        
        .page { display: none; padding: 20px; max-width: 800px; margin: auto; }
        .visible { display: block; }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #ff5e62; color: white; border: none; font-weight: bold; cursor: pointer; }
        .ticket { border-left: 8px solid #00873d; display: flex; justify-content: space-between; align-items: center; }
        .support-link { display: block; text-align: center; padding: 20px; background: #e8f5e9; color: #00873d; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('search-page', this)">Gözleg</div>
    <div class="nav-item" onclick="showPage('cabinet-page', this)">Meniň biletlerim</div>
    <div class="nav-item" onclick="showPage('support-page', this)">Gollanma</div>
</div>

<div id="search-page" class="page visible">
    <div class="card">
        <label>Nireden:</label><select id="from"></select>
        <label>Nirä:</label><select id="to"></select>
        <label>Sene:</label><input type="date" id="dateStart">
        <button onclick="searchFlights()">TAP</button>
    </div>
    <div id="searchResults"></div>
</div>

<div id="cabinet-page" class="page">
    <div class="card">
        <h3>Biletiňi tap</h3>
        <p style="font-size: 13px; color: #666;">Biletleriňizi görmek üçin pasport belgiňizi giriziň.</p>
        <input type="text" id="myPassport" placeholder="Meselem: I-AS 123456">
        <button onclick="loadMyBookings()" style="background: #00873d;">GÖRKEZ</button>
    </div>
    <div id="myResults"></div>
</div>

<div id="support-page" class="page">
    <div class="card">
        <h3>Kömek gerekmi?</h3>
        <p>Biz bilen habarlaşmak üçin aşakdaky düwmä basyň:</p>
        <a href="https://t.me/your_bot" class="support-link">💬 Telegram Goldawy (24/7)</a>
        <p style="margin-top:20px;">📞 Telefon: +993 12 000000</p>
        <p>📧 Email: support@sapar.tm</p>
    </div>
</div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
    <div class="card" style="width:320px;">
        <h3>Satyn almak</h3>
        <input type="hidden" id="tripId">
        <input type="text" id="pName" placeholder="Adyňyz we Familiýaňyz">
        <input type="text" id="pPass" placeholder="Pasport belgi">
        <button onclick="confirmBooking()">Tassyklamak</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:none; color:gray;">Yza</button>
    </div>
</div>

<script>
    const API = 'https://sapar-project-production.up.railway.app';

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('visible');
        el.classList.add('active');
    }

    window.onload = async () => {
        document.getElementById('dateStart').value = "2026-04-05";
        const res = await fetch(`${API}/api/cities`);
        const cities = await res.json();
        const f = document.getElementById('from'), t = document.getElementById('to');
        cities.forEach(c => { f.add(new Option(c, c)); t.add(new Option(c, c)); });
    };

    async function searchFlights() {
        const f = document.getElementById('from').value, t = document.getElementById('to').value, d = document.getElementById('dateStart').value;
        const res = await fetch(`${API}/api/search?from=${f}&to=${t}&date=${d}`);
        const data = await res.json();
        const div = document.getElementById('searchResults');
        div.innerHTML = data.length ? '' : 'Bilet tapylmady.';
        data.forEach(ticket => {
            div.innerHTML += `<div class="card ticket">
                <div><b>${ticket.time}</b><br><small>${ticket.airline}</small></div>
                <div style="text-align:right"><b>${ticket.price} TMT</b><br>
                <button style="padding:5px 10px; width:auto;" onclick="openModal(${ticket.id})">ALMAK</button></div>
            </div>`;
        });
    }

    function openModal(id) { document.getElementById('tripId').value = id; document.getElementById('modal').style.display = 'flex'; }

    async function confirmBooking() {
        const name = document.getElementById('pName').value, pass = document.getElementById('pPass').value, tid = document.getElementById('tripId').value;
        await fetch(`${API}/api/book`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ trip_id: tid, name, passport: pass })
        });
        alert("Üstünlikli alyndy!");
        document.getElementById('modal').style.display = 'none';
    }

    async function loadMyBookings() {
        const pass = document.getElementById('myPassport').value;
        const res = await fetch(`${API}/api/my-bookings?passport=${encodeURIComponent(pass)}`);
        const data = await res.json();
        const div = document.getElementById('myResults');
        div.innerHTML = data.length ? '' : 'Siziň adyňyza bilet tapylmady.';
        data.forEach(b => {
            div.innerHTML += `<div class="card" style="border-left: 5px solid gold;">
                <p><b>Bron ID: #${b.booking_id}</b></p>
                <p>${b.departure} → ${b.arrival}</p>
                <p>Sene: ${b.date} | Wagty: ${b.time}</p>
                <p><small>Ýolagçy: ${b.passenger_name}</small></p>
            </div>`;
        });
    }
</script>
</body>
</html>
