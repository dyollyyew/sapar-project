<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPAR.TM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tkm-green: #00563b; --tkm-gold: #c5a059; }
        body { font-family: Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f4f4; }
        
        /* САЙДБАР */
        .sidebar { width: 250px; background: var(--tkm-green); color: white; padding: 20px; display: flex; flex-direction: column; }
        .brand { font-size: 20px; font-weight: bold; border-bottom: 1px solid var(--tkm-gold); padding-bottom: 10px; margin-bottom: 20px; }
        .nav-link { padding: 12px; color: white; cursor: pointer; text-decoration: none; display: block; }
        .nav-link:hover { background: rgba(255,255,255,0.1); }

        /* КОНТЕНТ */
        .main { flex: 1; overflow-y: auto; }
        .top-bar { background: white; padding: 10px 20px; display: flex; justify-content: flex-end; gap: 15px; border-bottom: 1px solid #ddd; align-items: center; }
        
        .hero { background: var(--tkm-green); color: white; padding: 40px; text-align: center; }
        .search-box { max-width: 900px; margin: -30px auto 20px; background: white; padding: 20px; border-radius: 8px; display: flex; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* ПОДСКАЗКИ */
        .input-wrap { position: relative; flex: 1; }
        .input-wrap input { width: 100%; padding: 10px; box-sizing: border-box; }
        .hints { position: absolute; background: white; border: 1px solid #ccc; width: 100%; z-index: 10; display: none; max-height: 150px; overflow-y: auto; }
        .hints div { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; color: #333; }
        .hints div:hover { background: #eee; }

        .btn-search { background: #2ecc71; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .ticket { background: white; margin: 10px auto; max-width: 800px; display: flex; border: 1px solid #ddd; }
        .ticket-info { flex: 1; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .ticket-buy { width: 150px; background: #f9f9f9; padding: 20px; text-align: center; border-left: 1px dashed #ccc; }
        .btn-buy { background: #d63031; color: white; border: none; padding: 8px; width: 100%; cursor: pointer; }

        .page { display: none; padding: 20px; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">SAPAR.TM</div>
    <div id="menu-guest">
        <div class="nav-link" onclick="showP('search-p')"><i class="fas fa-search"></i> <span class="lang" data-tk="Gözleg" data-ru="Поиск">Gözleg</span></div>
        <div class="nav-link" onclick="openL()"><i class="fas fa-user"></i> <span class="lang" data-tk="Giriş" data-ru="Войти">Giriш</span></div>
    </div>
    <div id="menu-user" style="display:none;">
        <div class="nav-link" onclick="showP('search-p')"><i class="fas fa-plane"></i> <span class="lang" data-tk="Gözleg" data-ru="Поиск">Gözleg</span></div>
        <div class="nav-link" onclick="showP('orders-p')"><i class="fas fa-ticket-alt"></i> <span class="lang" data-tk="Sargytlarym" data-ru="Мои заказы">Sargytlarym</span></div>
        <div class="nav-link" onclick="showP('settings-p')"><i class="fas fa-cog"></i> <span class="lang" data-tk="Sazlamalar" data-ru="Настройки">Sazlamalar</span></div>
        <div class="nav-link" onclick="location.reload()" style="color: #ffaaae; margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> <span class="lang" data-tk="Çykyş" data-ru="Выход">Çykyş</span></div>
    </div>
</div>

<div class="main">
    <div class="top-bar">
        <i class="fas fa-user-circle" style="font-size: 20px; cursor:pointer;" onclick="openL()"></i>
        <b style="cursor:pointer"><span onclick="setL('tk')">TKM</span> | <span onclick="setL('ru')">РУС</span></b>
    </div>

    <div id="search-p" class="page active">
        <div class="hero">
            <h1 id="slogan">Komfortly uçuş biziň bilen</h1>
        </div>
        <div class="search-box">
            <div class="input-wrap">
                <input type="text" id="from" placeholder="Nireden" oninput="suggest(this, 'h1')">
                <div id="h1" class="hints"></div>
            </div>
            <div class="input-wrap">
                <input type="text" id="to" placeholder="Nirä" oninput="suggest(this, 'h2')">
                <div id="h2" class="hints"></div>
            </div>
            <input type="date" id="date">
            <button class="btn-search" onclick="searchFlights()">TAP</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="orders-p" class="page">
        <h2 class="lang" data-tk="Sargytlarym" data-ru="Мои заказы">Sargytlarym</h2>
        <p>Билетов пока нет.</p>
    </div>

    <div id="settings-p" class="page">
        <h2 class="lang" data-tk="Sazlamalar" data-ru="Настройки">Sazlamalar</h2>
        <div style="background:white; padding:20px;">
            <label>Имя:</label><br>
            <input type="text" id="u-name" style="width:100%; padding:10px; margin:10px 0;">
            <button class="btn-search">Save</button>
        </div>
    </div>
</div>

<script>
    const cities = ["Ashgabat (ASB)", "Mary (MYP)", "Dashoguz (TAZ)", "Turkmenabat (CRZ)", "Turkmenbashy (KRW)", "Kerki (KEA)", "Istanbul (IST)", "Moscow (DME)", "Dubai (DXB)"];

    function suggest(inp, id) {
        const h = document.getElementById(id);
        const val = inp.value.toLowerCase();
        h.innerHTML = "";
        if(!val) { h.style.display="none"; return; }
        const res = cities.filter(c => c.toLowerCase().includes(val));
        if(res.length > 0) {
            h.style.display="block";
            res.forEach(c => {
                const d = document.createElement("div");
                d.innerText = c;
                d.onclick = () => { inp.value = c; h.style.display="none"; };
                h.appendChild(d);
            });
        }
    }

    // ТВОЯ ЛОГИКА (НЕ ИЗМЕНЕНА)
    async function searchFlights() {
        const f = document.getElementById('from').value;
        const t = document.getElementById('to').value;
        const d = document.getElementById('date').value;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "Gözlenilýär...";
        try {
            const response = await fetch('/api/search-live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: f, destination: t, date: d })
            });
            const data = await response.json();
            resDiv.innerHTML = "";
            data.tickets.forEach(tick => {
                const pr = Math.round(tick.price * 1.05);
                resDiv.innerHTML += `
                    <div class="ticket">
                        <div class="ticket-info">
                            <div><b>10:00</b><br>${tick.origin}</div>
                            <div style="color:var(--tkm-gold)"><i class="fas fa-plane"></i></div>
                            <div><b>14:00</b><br>${tick.destination}</div>
                        </div>
                        <div class="ticket-buy">
                            <div style="font-weight:bold; margin-bottom:10px;">${pr} RUB</div>
                            <button class="btn-buy" onclick="alert('OK')">SATYN AL</button>
                        </div>
                    </div>`;
            });
        } catch(e) { resDiv.innerHTML = "Error!"; }
    }

    function setL(l) {
        document.querySelectorAll('.lang').forEach(e => e.innerText = e.getAttribute('data-' + l));
        document.getElementById('slogan').innerText = (l==='tk') ? "Komfortly uçuş biziň bilen" : "Комфортный полет с нами";
    }

    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openL() {
        const u = prompt("Login:");
        if(u) {
            document.getElementById('menu-guest').style.display='none';
            document.getElementById('menu-user').style.display='block';
            document.getElementById('u-name').value = u;
        }
    }
</script>
</body>
</html>
